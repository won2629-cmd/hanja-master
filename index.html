      </div>
      <div style={{ marginTop: 22 }}><BigButton t={t} onClick={onNext} disabled={seen < ch.words.length}>{seen < ch.words.length ? `${ch.words.length - seen}개 더 열어보기` : "뜻 유추하러 가기 →"}</BigButton></div>
    </div>
  );
}

function Infer({ ch, t, onNext }) {
  const quizWords = useMemo(() => sample(ch.words, Math.min(4, ch.words.length)), [ch]);
  const [idx, setIdx] = useState(0); const [hint, setHint] = useState(0); const [picked, setPicked] = useState(null);
  const w = quizWords[idx];
  const options = useMemo(() => shuffle([w.def, ...distractDefs(ch, w.def, 3)]), [w]);
  const answer = (opt) => { if (picked) return; setPicked(opt); };
  const next = () => { if (idx + 1 < quizWords.length) { setIdx(idx + 1); setHint(0); setPicked(null); } else onNext(); };
  return (
    <div>
      <div style={{ fontFamily: DISPLAY, color: t.accent, fontSize: 14, textAlign: "center" }}>③ 유추 · 뜻 짐작하기 ({idx + 1}/{quizWords.length})</div>
      <div style={{ background: "#fff", border: `2px solid ${t.color}`, borderRadius: 22, padding: "20px 16px", marginTop: 12, textAlign: "center" }}>
        <div style={{ fontFamily: DISPLAY, fontSize: 30 }}>{w.word}</div>
        <div style={{ fontFamily: BRUSH, fontSize: 24, color: t.accent, marginTop: 4 }}>{w.hanja}</div>
        {hint >= 1 && (
          <div style={{ display: "flex", justifyContent: "center", gap: 8, marginTop: 14, flexWrap: "wrap", animation: "pop .3s both" }}>
            {w.parts.map(([c, m], k) => (
              <div key={k} style={{ background: t.bg, border: `2px solid ${t.color}`, borderRadius: 12, padding: "6px 10px", minWidth: 46 }}>
                <div style={{ fontFamily: BRUSH, fontSize: 24, color: t.accent }}>{c}</div>
                <div style={{ fontSize: 12, color: "#5A4A33", marginTop: 2 }}>{m} {w.word[k]}</div>
              </div>
            ))}
          </div>
        )}
        {hint >= 2 && <div style={{ marginTop: 12, fontSize: 15, color: t.accent, fontFamily: DISPLAY, animation: "pop .3s both" }}>💡 “{w.hint}” 일까?</div>}
        {hint < 2 && !picked && (
          <button className="btn" onClick={() => setHint((h) => h + 1)} style={{ marginTop: 14, cursor: "pointer", background: "none", border: `1.5px dashed ${t.color}`, color: t.accent, borderRadius: 999, padding: "6px 14px", fontFamily: DISPLAY, fontSize: 13, display: "inline-flex", gap: 5, alignItems: "center" }}>
            <Lightbulb size={15} /> {["음뜻 보기", "이어 보기"][hint]}
          </button>
        )}
      </div>
      <div style={{ marginTop: 14 }}>{options.map((opt, i) => <Option key={i} t={t} opt={opt} picked={picked} correct={w.def} onClick={() => answer(opt)} />)}</div>
      {picked && (
        <div style={{ marginTop: 16, animation: "pop .3s both" }}>
          <div style={{ textAlign: "center", fontFamily: DISPLAY, color: picked === w.def ? "#2E9E4F" : "#D63A2E", marginBottom: 10 }}>{picked === w.def ? `정답! ${w.hanja} = ${w.def}` : `아쉬워요! 정답은 “${w.def}”`}</div>
          <BigButton t={t} onClick={next}>{idx + 1 < quizWords.length ? "다음 낱말 →" : "마스터 도전! →"}</BigButton>
        </div>
      )}
    </div>
  );
}

function buildQuestions(ch, count) {
  const T = [];
  // 1) 낱말 → 뜻 (오답은 같은 글자의 다른 낱말 뜻 위주)
  ch.words.forEach((w) => T.push({
    q: `「${w.word} (${w.hanja})」의 뜻은?`,
    options: shuffle([w.def, ...distractDefs(ch, w.def, 3)]),
    answer: w.def,
  }));
  // 2) 한자 → 음뜻
  T.push({
    q: `「${ch.char}」의 음과 뜻은?`,
    options: shuffle([ch.meaning, ...sample(ALL_CHARS.filter((c) => c.char !== ch.char).map((c) => c.meaning), 3)]),
    answer: ch.meaning,
  });
  // 3) 뜻 조합 → 낱말 (보기를 같은 글자의 낱말로만 채워 소리로는 못 풀게 함)
  if (ch.words.length >= 4) {
    ch.words.forEach((w) => {
      const compo = w.parts.map(([c, m]) => `${m}(${c})`).join(" + ");
      const distract = sample(ch.words.filter((x) => x.word !== w.word), 3).map((x) => x.word);
      T.push({ q: `뜻을 합치면? ${compo} = ?`, options: shuffle([w.word, ...distract]), answer: w.word });
    });
  }
  // 4) 같은 소리 다른 한자 함정 (같은 소리 보기가 3개 이상 있을 때만)
  if ((ch.traps || []).length >= 3) {
    const w = ch.words[0];
    T.push({ q: `소리는 모두 「${ch.sound}」! 「${ch.meaning}(${ch.char})」가 들어간 낱말은?`, options: shuffle([w.word, ...sample(ch.traps, 3)]), answer: w.word });
  }
  return sample(T, Math.min(count, T.length));
}

function Master({ ch, t, onPass }) {
  const qs = useMemo(() => buildQuestions(ch, 8), [ch]);
  const [idx, setIdx] = useState(0); const [picked, setPicked] = useState(null); const [score, setScore] = useState(0); const [fin, setFin] = useState(false);
  const q = qs[idx];
  const pick = (o) => { if (picked) return; setPicked(o); if (o === q.answer) setScore((s) => s + 1); };
  const next = () => { if (idx + 1 < qs.length) { setIdx(idx + 1); setPicked(null); } else setFin(true); };
  if (fin) {
    const pass = score >= Math.ceil(qs.length * 0.7); const stars = score === qs.length ? 3 : pass ? 2 : 1;
    return (
      <div style={{ textAlign: "center", position: "relative", paddingTop: 10 }}>
        {pass && <Confetti color={t.color} />}
        <div style={{ fontFamily: DISPLAY, fontSize: 22, color: t.accent }}>{pass ? "한자 카드 획득!" : "조금만 더!"}</div>
        <div style={{ "--gl": t.color, animation: pass ? "glow 1.6s infinite" : "none", display: "inline-block", borderRadius: 28, marginTop: 16 }}>
          <div style={{ width: 180, height: 230, borderRadius: 24, background: t.bg, border: `3px solid ${t.color}`, display: "grid", placeItems: "center", boxShadow: "0 10px 0 rgba(0,0,0,.08)" }}>
            <div>
              <div style={{ fontFamily: BRUSH, fontSize: 96, color: t.accent }}>{ch.char}</div>
              <div style={{ fontFamily: DISPLAY, fontSize: 20 }}>{ch.meaning}</div>
              <div style={{ marginTop: 6 }}>{[0,1,2].map((s)=>(<Star key={s} size={18} style={{margin:"0 1px"}} fill={stars>s?"#E8A020":"none"} stroke={stars>s?"#E8A020":"#D8CBB0"} />))}</div>
            </div>
          </div>
        </div>
        <p style={{ color: "#7A6A52", marginTop: 16 }}>{qs.length}문제 중 <b style={{ color: t.accent }}>{score}문제</b> 정답</p>
        {pass ? <BigButton t={t} onClick={() => onPass(score, qs.length)}>도감에 넣고 지도로 →</BigButton>
              : <BigButton t={t} onClick={() => { setIdx(0); setPicked(null); setScore(0); setFin(false); }}>다시 도전하기</BigButton>}
      </div>
    );
  }
  return (
    <div>
      <div style={{ fontFamily: DISPLAY, color: t.accent, fontSize: 14, textAlign: "center" }}>④ 마스터 · 종합 테스트 ({idx + 1}/{qs.length})</div>
      <div style={{ height: 6, background: "#EFE7D6", borderRadius: 99, marginTop: 8 }}><div style={{ height: "100%", width: `${(idx / qs.length) * 100}%`, background: t.color, borderRadius: 99, transition: "width .3s" }} /></div>
      <QuestionBlock t={t} q={q} picked={picked} onPick={pick} />
      {picked && <div style={{ marginTop: 14 }}><BigButton t={t} onClick={next}>{idx + 1 < qs.length ? "다음 →" : "결과 보기"}</BigButton></div>}
    </div>
  );
}

function QuestionBlock({ t, q, picked, onPick }) {
  return (
    <div>
      <div style={{ background: "#fff", border: `2px solid ${t.color}`, borderRadius: 20, padding: "18px 16px", marginTop: 12, textAlign: "center", fontFamily: DISPLAY, fontSize: 18, animation: "pop .3s both" }}>{q.q}</div>
      <div style={{ marginTop: 12 }}>{q.options.map((opt, i) => <Option key={i} t={t} opt={opt} picked={picked} correct={q.answer} onClick={() => onPick(opt)} />)}</div>
    </div>
  );
}

function Option({ t, opt, picked, correct, onClick }) {
  let bg = "#fff", border = "#EADFC9", color = "#2B2118", anim = "none";
  if (picked) {
    if (opt === correct) { bg = "#E8F6EC"; border = "#2E9E4F"; color = "#1E6E37"; }
    else if (opt === picked) { bg = "#FCEAE8"; border = "#D63A2E"; color = "#A52119"; anim = "shake .4s"; }
    else { color = "#B6A98F"; }
  }
  return (
    <button className="btn" onClick={onClick} disabled={!!picked}
      style={{ display: "flex", alignItems: "center", gap: 10, width: "100%", textAlign: "left", cursor: picked ? "default" : "pointer", background: bg, border: `2px solid ${border}`, color, borderRadius: 16, padding: "13px 14px", marginBottom: 9, fontSize: 15.5, fontFamily: FONT, animation: anim }}>
      <span style={{ flex: 1 }}>{opt}</span>
      {picked && opt === correct && <Check size={20} color="#2E9E4F" />}
      {picked && opt === picked && opt !== correct && <X size={20} color="#D63A2E" />}
    </button>
  );
}

function BigButton({ t, onClick, disabled, children }) {
  return (
    <button className="btn" onClick={onClick} disabled={disabled} style={{ width: "100%", cursor: disabled ? "not-allowed" : "pointer", border: "none", borderRadius: 18, padding: "15px", fontFamily: DISPLAY, fontSize: 17, color: "#fff", background: disabled ? "#CBBEA4" : t.color, boxShadow: disabled ? "none" : "0 5px 0 rgba(0,0,0,.12)" }}>{children}</button>
  );
}

function Confetti({ color }) {
  const bits = Array.from({ length: 26 }); const colors = [color, "#E8A020", "#2E9E4F", "#5B6CB8", "#D63A2E"];
  return <div style={{ position: "absolute", inset: 0, overflow: "hidden", pointerEvents: "none" }}>{bits.map((_, i) => (<span key={i} style={{ position: "absolute", top: 0, left: `${(i * 3.8) % 100}%`, width: 8, height: 12, background: colors[i % colors.length], borderRadius: 2, animation: `confetti ${1.6 + (i % 5) * 0.3}s ${(i % 7) * 0.12}s ease-in forwards` }} />))}</div>;
}

function GiftPopup({ message, onClose }) {
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, zIndex: 60, background: "rgba(24,16,4,.55)", display: "grid", placeItems: "center", padding: 20, animation: "pop .25s both" }}>

      </div>

  );
}

// ── 학생 작품 도감 팝업 ──────────────────────────────────────
// 작품 추가 방법: ① 저장소 art 폴더에 이미지 넣기  ② 아래에 한 줄 추가
// 예) "國": { img: "art/guk.png", by: "김민준" },
const CHAR_ART = {
  "韓": { img: "art/han.png", by: "손승범" },
};

function Collection({ progress, totalStars, onBack }) {
  const [artPop, setArtPop] = useState(null);
  const artTimer = React.useRef(null);
  useEffect(() => () => clearTimeout(artTimer.current), []);
  const openArt = (c) => {
    const a = CHAR_ART[c.char];
    if (!a) return;
    setArtPop({ char: c.char, meaning: c.meaning, img: a.img, by: a.by });
    clearTimeout(artTimer.current);
    artTimer.current = setTimeout(() => setArtPop(null), 2500);
  };
  const closeArt = () => { clearTimeout(artTimer.current); setArtPop(null); };
  return (
    <div>
      <style>{`@keyframes artPopIn { 0%{transform:scale(.4);opacity:0} 60%{transform:scale(1.06)} 100%{transform:scale(1);opacity:1} }`}</style>
      <div style={{ display: "flex", alignItems: "center", gap: 8, paddingTop: 18 }}>
        <button className="btn" onClick={onBack} style={{ background: "none", border: "none", cursor: "pointer", color: "#5A4A33" }}><ChevronLeft size={26} /></button>
        <h2 style={{ fontFamily: DISPLAY, fontSize: 24, margin: 0 }}>한자 카드 도감</h2>
      </div>
      <p style={{ color: "#9A8A72", fontSize: 13, marginLeft: 4 }}>모은 별 {totalStars}개 · 마스터하면 색이 채워져요</p>
      {CURRICULUM.map((st, i) => (
        <div key={st.name} style={{ marginTop: 18 }}>
          <div style={{ fontFamily: DISPLAY, fontSize: 15, color: BELT_THEME[i].accent, marginBottom: 8, display: "flex", alignItems: "center", gap: 6 }}><BeltIcon belt={BELTS[i]} size={15} /> {BELTS[i].grade} · {st.name}</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 7 }}>
            {st.chars.map((c) => {
              const t = themeFor(st, c); const got = progress[c.char]?.mastered;
              return (
                <div key={c.char} onClick={() => openArt(c)} style={{ position: "relative", borderRadius: 12, padding: "8px 2px", textAlign: "center", background: got ? t.bg : "#F1EADB", border: `2px solid ${got ? t.color : "#E0D5BE"}`, cursor: CHAR_ART[c.char] ? "pointer" : "default" }}>
                  {CHAR_ART[c.char] && <span style={{ position: "absolute", top: 2, right: 3, fontSize: 9 }}>🎨</span>}
                  <div style={{ fontFamily: BRUSH, fontSize: 26, color: got ? t.accent : "#C7BBA0" }}>{c.char}</div>
                  <div style={{ fontSize: 9.5, color: got ? "#5A4A33" : "#B6A98F" }}>{got ? c.sound : ""}</div>
                </div>
              );
            })}
          </div>
        </div>
      ))}
      {artPop && (
        <div onClick={closeArt} style={{ position: "fixed", inset: 0, background: "rgba(38,28,14,0.45)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 80 }}>
          <div style={{ background: "#FBF6EA", border: "2px solid #C9A24A", borderRadius: 16, padding: "14px 14px 12px", width: 230, textAlign: "center", animation: "artPopIn .35s ease-out" }}>
            <img src={artPop.img} alt={artPop.char + " 학생 작품"} style={{ width: "100%", borderRadius: 10, display: "block" }} />
            <p style={{ margin: "10px 0 0", fontFamily: DISPLAY, fontSize: 17, color: "#5A4A33" }}>{artPop.char} <span style={{ fontSize: 13, color: "#9A8A72" }}>{artPop.meaning}</span></p>
            <p style={{ margin: "2px 0 0", fontSize: 11.5, color: "#B0884A" }}>만든 사람: {artPop.by}</p>
          </div>
        </div>
      )}
    </div>
  );
}


/* ---------- 반 선택 (ClassGate) ---------- */
function ClassGate() {
  const [cls, setCls] = useState(() => {
    try { const v = localStorage.getItem("hanja_class"); return CLASSES[v] ? v : null; } catch (e) { return null; }
  });
  if (cls) { CLASS_KEY = cls; return <TimeGate />; }
  const pick = (k) => {
    try { localStorage.setItem("hanja_class", k); } catch (e) {}
    CLASS_KEY = k; setCls(k);
  };
  const card = { flex: 1, cursor: "pointer", background: "#fff", border: "2px solid #EADFC9", borderRadius: 22, padding: "22px 10px", textAlign: "center", boxShadow: "0 6px 0 rgba(0,0,0,.05)", fontFamily: DISPLAY };
  return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "#FBF7EF", padding: 24, boxSizing: "border-box" }}>
      <div style={{ width: "100%", maxWidth: 420 }}>
        <div style={{ textAlign: "center" }}>
          <div style={{ width: 116, height: 116, margin: "0 auto", borderRadius: 30, background: "#fff", border: "3px solid #C9A227", display: "grid", placeItems: "center", boxShadow: "0 10px 0 rgba(0,0,0,.06)", animation: "pop .5s both" }}>
            <span style={{ fontFamily: BRUSH, fontSize: 66, color: "#A85808" }}>守</span>
          </div>
          <h1 style={{ fontFamily: DISPLAY, fontSize: 34, margin: "16px 0 2px" }}>한자 수호대</h1>
          <p style={{ color: "#9A8A72", fontSize: 13, margin: 0 }}>너의 수호대를 선택하라!</p>
        </div>
        <div style={{ display: "flex", gap: 12, marginTop: 26 }}>
          <button className="btn" onClick={() => pick("oreo")} style={card}>
            <div style={{ fontFamily: BRUSH, fontSize: 34, color: "#1C5E50" }}>玄武</div>
            <div style={{ fontSize: 19, color: "#3F352A", marginTop: 6 }}>오레오</div>
          </button>
          <button className="btn" onClick={() => pick("kingdom")} style={card}>
            <div style={{ fontFamily: BRUSH, fontSize: 34, color: "#B0392B" }}>朱雀</div>
            <div style={{ fontSize: 19, color: "#3F352A", marginTop: 6 }}>킹덤</div>
          </button>
        </div>
        <p style={{ textAlign: "center", color: "#B0A083", fontSize: 11.5, marginTop: 18 }}>한 번 고르면 이 기기에 기억돼요. 이름 화면 아래에서 바꿀 수 있어요.</p>
      </div>
    </div>
  );
}

function TimeGate() {
  const [now, setNow] = useState(new Date());
  const [bypass, setBypass] = useState(false);
  useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 30000);
    return () => clearInterval(t);
  }, []);
  const h = now.getHours();
  const blocked = (h >= 22 || h < 7) && !bypass;
  if (blocked) {
    const pad = (n) => (n < 10 ? '0' + n : '' + n);
    return (
      <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'radial-gradient(125% 80% at 50% -5%,#3a3228,#1b1611 55%,#0b0906)', color: '#F0E6CE', fontFamily: 'sans-serif', padding: '24px', textAlign: 'center' }}>
        <div style={{ maxWidth: '340px' }}>
          <div style={{ fontSize: '64px' }}>🌙</div>
          <h1 style={{ color: '#EBCB67', fontSize: '24px', margin: '12px 0 8px' }}>지금은 쉬는 시간이에요</h1>
          <p style={{ color: '#D8C79A', fontSize: '15px', lineHeight: 1.7, margin: 0 }}>
            한자 수호대는 <b>밤 10시</b>부터 <b>아침 7시</b>까지는 이용할 수 없어요.<br />
            푹 자고 내일 아침에 다시 만나요!
          </p>
          <p style={{ color: '#9a8a60', fontSize: '13px', marginTop: '16px' }}>지금 시각 {pad(now.getHours())}:{pad(now.getMinutes())}</p>
          <button onClick={() => { const p = window.prompt('교사 확인용 비밀번호를 입력하세요'); if (p === ADMIN_PIN) setBypass(true); else if (p != null) window.alert('비밀번호가 틀렸어요'); }} style={{ marginTop: '22px', fontFamily: 'sans-serif', fontSize: '12px', color: '#9a8a60', background: 'none', border: '1px solid #5a4a2a', borderRadius: '8px', padding: '7px 12px', cursor: 'pointer' }}>교사 확인</button>
        </div>
      </div>
    );
  }
  return <HanjaMaster />;
}
