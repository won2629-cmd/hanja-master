const parseRaw = (raw) => raw.split("|").map((s) => s.trim()).filter(Boolean).map((s) => {
  const p = s.split(/\s+/); const char = p[0]; const sound = p[p.length - 1]; const gloss = p.slice(1, -1).join(" ");
  return { char, sound, gloss, meaning: gloss + " " + sound };
});

  ...st, si,
  chars: parseRaw(st.raw).map((c) => ({ ...c, words: (st.words && st.words[c.char]) || [], traps: (st.traps && st.traps[c.char]) || [], si })),
}));
const ALL_CHARS = CURRICULUM.flatMap((s) => s.chars);
const ALL_WORDS = ALL_CHARS.flatMap((c) => c.words.map((w) => ({ ...w, char: c.char })));
const ALL_DEFS = ALL_WORDS.map((w) => w.def);

// distractor defs: prefer other words of the SAME character (closer, must read meaning), pad with random
const distractDefs = (ch, correct, n = 3) => {
  const same = ch.words.map((w) => w.def).filter((d) => d !== correct);
  const picks = sample(same, Math.min(n, same.length));
  if (picks.length < n) picks.push(...sample(ALL_DEFS.filter((d) => d !== correct && !picks.includes(d)), n - picks.length));
  return picks;
};

const themeFor = (stage, ch) => {
  const b = BELT_THEME[stage.si] || BELT_THEME[0];
  const el = ch && ELEMENT[ch.char];
  return { color: b.color, accent: b.accent, bg: b.bg, weekday: el ? el.weekday : "", icon: el ? el.icon : "" };
};

function HanjaMaster() {
  const [student, setStudent] = useState(null);
  const [profiles, setProfiles] = useState({}); // 이름 -> { 한자: {mastered, stars} }
  const [passwords, setPasswords] = useState({}); // 이름 -> 비밀번호(4자리)
  const [screen, setScreen] = useState("home");
  const [afterLogin, setAfterLogin] = useState("stages"); // 로그인 후 이동할 화면
  const [si, setSi] = useState(0);
  const [ci, setCi] = useState(0);
  const [unlockAll, setUnlockAll] = useState(false); // 단계 잠금: 기본은 순서 잠금(교사만 변경)
  const [raidOn, setRaidOnState] = useState(false); // 봉인전 표시 (교사 토글)
  const [giftsGiven, setGiftsGiven] = useState({}); // 학생 -> [구간0,1,2,3 받음 여부]
  const [gift, setGift] = useState(null); // {band} | null
  const [giftLog, setGiftLog] = useState([]); // 교사 명단: {id, student, si, band, ts, given}
  const [lastSeen, setLastSeen] = useState({}); // 이름 -> 마지막 접속 시각(ts)

  // Firebase 실시간 동기화 (연결 안 되면 이 기기 메모리로만 동작)
  useEffect(() => {
    if (!_db) return;
    const sref = dbref("students");
    const gref = dbref("giftLog");
    const hs = sref.on("value", (snap) => {
      const v = snap.val() || {}; const profs = {}, pws = {}, gifts = {}, ls = {};
      Object.values(v).forEach((s) => { if (!s || !s.name) return; profs[s.name] = s.progress || {}; pws[s.name] = s.pin; gifts[s.name] = s.gifts || [false, false, false, false]; ls[s.name] = s.lastSeen || 0; });
      setProfiles(profs); setPasswords(pws); setGiftsGiven(gifts); setLastSeen(ls);
    });
    const hg = gref.on("value", (snap) => {
      const v = snap.val() || {};
      setGiftLog(Object.entries(v).map(([id, e]) => ({ id, ...e })).sort((a, b) => (b.ts || 0) - (a.ts || 0)));
    });
    const cref = dbref("settings/unlockAll");
    const hc = cref.on("value", (snap) => setUnlockAll(snap.val() === true));
    const rref = dbref("settings/raidOn");
    const hr = rref.on("value", (snap) => setRaidOnState(snap.val() === true));
    return () => { sref.off("value", hs); gref.off("value", hg); cref.off("value", hc); rref.off("value", hr); };
  }, []);

  // 마지막 접속 시각: 로그인한 학생이 켜 있는 동안 주기적으로 기록 (가정 사용 시점 파악용)
  useEffect(() => {
    if (!student) return;
    const stamp = () => { if (_db) dbref("students/" + fbKey(student) + "/lastSeen").set(Date.now()).catch(() => {}); else setLastSeen((m) => ({ ...m, [student]: Date.now() })); };
    stamp();
    const t = setInterval(stamp, 60000);
    return () => clearInterval(t);
  }, [student]);

  const progress = (student && profiles[student]) || {};
  const totalStars = Object.values(progress).reduce((s, p) => s + (p.stars || 0), 0);
  const masteredCount = Object.values(progress).filter((p) => p.mastered).length;

  const login = (name, pw) => {
    if (_db) {
      const ref = dbref("students/" + fbKey(name));
      ref.once("value").then((snap) => {
        if (!snap.exists()) ref.set({ name, pin: pw, progress: {}, gifts: [false, false, false, false], lastSeen: Date.now() });
        else ref.update({ lastSeen: Date.now() });
      }).catch(() => {});
    } else {
      setProfiles((p) => (p[name] ? p : { ...p, [name]: {} }));
      setPasswords((g) => (g[name] !== undefined ? g : { ...g, [name]: pw }));
      setGiftsGiven((g) => (g[name] ? g : { ...g, [name]: [false, false, false, false] }));
      setLastSeen((m) => ({ ...m, [name]: Date.now() }));
    }
    try { localStorage.setItem("hanja_me", name); } catch (e) {}
    setStudent(name); setScreen(afterLogin);
  };
  const needLogin = (dest) => { if (student) setScreen(dest); else { setAfterLogin(dest); setScreen("login"); } };
  const changeUser = () => { setAfterLogin("home"); setScreen("login"); };
  const setUnlock = (v) => { if (_db) dbref("settings/unlockAll").set(v).catch(() => {}); else setUnlockAll(v); };
  const setRaidOn = (v) => { if (_db) dbref("settings/raidOn").set(v).catch(() => {}); else setRaidOnState(v); };
  const refreshData = () => {
    if (!_db) return;
    dbref("students").once("value").then((snap) => {
      const v = snap.val() || {}; const profs = {}, pws = {}, gifts = {}, ls = {};
      Object.values(v).forEach((s) => { if (!s || !s.name) return; profs[s.name] = s.progress || {}; pws[s.name] = s.pin; gifts[s.name] = s.gifts || [false, false, false, false]; ls[s.name] = s.lastSeen || 0; });
      setProfiles(profs); setPasswords(pws); setGiftsGiven(gifts); setLastSeen(ls);
    }).catch(() => {});
    dbref("giftLog").once("value").then((snap) => {
      const v = snap.val() || {};
      setGiftLog(Object.entries(v).map(([id, e]) => ({ id, ...e })).sort((a, b) => (b.ts || 0) - (a.ts || 0)));
    }).catch(() => {});
  };
  const deleteStudent = (name) => {
    if (_db) { dbref("students/" + fbKey(name)).remove().catch(() => {}); }
    else {
      setProfiles((p) => { const q = { ...p }; delete q[name]; return q; });
      setPasswords((g) => { const q = { ...g }; delete q[name]; return q; });
      setGiftsGiven((g) => { const q = { ...g }; delete q[name]; return q; });
      setLastSeen((m) => { const q = { ...m }; delete q[name]; return q; });
    }
  };
  const toggleGiven = (id) => {
    if (_db) { const e = giftLog.find((x) => x.id === id); dbref("giftLog/" + id + "/given").set(e ? !e.given : true).catch(() => {}); }
    else setGiftLog((L) => L.map((e) => (e.id === id ? { ...e, given: !e.given } : e)));
  };

  const finishChar = (ch, stars) => {
    const prev = profiles[student] && profiles[student][ch];
    const newStars = Math.max(stars, (prev && prev.stars) || 0);
    const t = prev && prev.mastered ? prev.t : Date.now(); // 처음 마스터한 시각 유지
    const rec = { mastered: true, stars: newStars };
    if (t) rec.t = t;
    if (_db) dbref("students/" + fbKey(student) + "/progress/" + ch).set(rec).catch(() => {});
    else setProfiles((p) => { const cur = p[student] || {}; return { ...p, [student]: { ...cur, [ch]: rec } }; });
    setScreen("map");
    // 깜짝 복(福) 한자: 같은 구간에서 아직 안 받았다면 무작위 타이밍으로 등장
    const band = bandOf(si);
    if (!(giftsGiven[student] || [])[band] && Math.random() < 0.18) {
      if (_db) {
        dbref("students/" + fbKey(student) + "/gifts/" + band).set(true).catch(() => {});
        dbref("giftLog").push({ student, si, band, ts: Date.now(), given: false }).catch(() => {});
      } else {
        setGiftsGiven((g) => { const arr = [...(g[student] || [false, false, false, false])]; arr[band] = true; return { ...g, [student]: arr }; });
        setGiftLog((L) => [{ id: Date.now() + "-" + Math.random().toString(36).slice(2, 6), student, si, band, ts: Date.now(), given: false }, ...L]);
      }
      setGift({ band });
    }
  };

  return (
    <div style={{ fontFamily: FONT, minHeight: "100vh", background: "#FBF7EF", color: "#2B2118",
      backgroundImage: "radial-gradient(#e7ddc9 0.6px, transparent 0.6px)", backgroundSize: "14px 14px" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&family=Song+Myung&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        @keyframes pop { 0%{transform:scale(.7);opacity:0} 60%{transform:scale(1.06)} 100%{transform:scale(1);opacity:1} }
        @keyframes brushIn { 0%{opacity:0;transform:translateY(10px) scale(.85)} 100%{opacity:1;transform:none} }
        @keyframes floaty { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
        @keyframes confetti { 0%{transform:translateY(-10px) rotate(0);opacity:1} 100%{transform:translateY(420px) rotate(540deg);opacity:0} }
        @keyframes glow { 0%,100%{box-shadow:0 0 0 0 rgba(0,0,0,0)} 50%{box-shadow:0 0 28px 4px var(--gl)} }
        .btn:active { transform: scale(.97); }
      `}</style>
      <div style={{ maxWidth: 460, margin: "0 auto", padding: "0 16px 40px" }}>
        {screen === "home" && <Home student={student} totalStars={totalStars} masteredCount={masteredCount}
          onStart={() => { setSi(0); needLogin("stages"); }}
          onHall={() => setScreen("hall")} onRecords={() => needLogin("collection")}
          onTeacher={() => setScreen("teacherAuth")} onChangeUser={changeUser} onRaid={() => needLogin("raid")} raidOn={raidOn} />}
        {screen === "login" && <Login passwords={passwords} onLogin={login} onBack={() => setScreen("home")} />}
        {screen === "hall" && <HallOfFame profiles={profiles} onBack={() => setScreen("home")} />}
        {screen === "stages" && <StageSelect student={student} onBack={() => setScreen("home")} progress={progress} totalStars={totalStars} masteredCount={masteredCount}
          unlockAll={unlockAll} onOpen={(i) => { setSi(i); setScreen("map"); }} />}
        {screen === "map" && <MapScreen stage={CURRICULUM[si]} stageIndex={si} progress={progress}
          onBack={() => setScreen("stages")} onOpen={(i) => { setCi(i); setScreen("char"); }}
          onOpenStage={(i) => { setSi(i); setCi(0); }} />}
        {screen === "char" && <CharScreen key={CURRICULUM[si].chars[ci].char} stage={CURRICULUM[si]} ch={CURRICULUM[si].chars[ci]}
          onBack={() => setScreen("map")} onFinish={finishChar} />}
        {screen === "collection" && <Collection progress={progress} totalStars={totalStars} onBack={() => setScreen("home")} />}
        {screen === "raid" && <HanjaRaid student={student} progress={progress} onBack={() => setScreen("home")} />}
        {screen === "teacherAuth" && <TeacherGate onOk={() => setScreen("teacher")} onBack={() => setScreen("home")} />}
        {screen === "teacher" && <TeacherDashboard profiles={profiles} log={giftLog} onToggle={toggleGiven} lastSeen={lastSeen} unlockAll={unlockAll} onToggleLock={() => setUnlock(!unlockAll)} raidOn={raidOn} onToggleRaid={() => setRaidOn(!raidOn)} onRefresh={refreshData} onDeleteStudent={deleteStudent} onBack={() => setScreen("home")} />}
      </div>
      {gift && <GiftPopup message={GIFT_MESSAGES[gift.band]} onClose={() => setGift(null)} />}
    </div>
  );
}

function HanjaRaid({ student, progress, onBack }) {
  const key = fbKey(student);
  const deck = useMemo(() => {
    const byChar = {}; ALL_CHARS.forEach((c) => { byChar[c.char] = c; });
    return Object.keys(progress || {})
      .filter((ch) => progress[ch] && progress[ch].mastered)
      .map((ch) => byChar[ch]).filter(Boolean)
      .map((c) => ({ char: c.char, meaning: c.meaning, stars: Math.max(1, (progress[c.char].stars || 1)), pw: Math.min(3, Math.max(1, (progress[c.char].stars || 1))), words: c.words || [] }));
  }, [progress]);
  const curGrade = useMemo(() => { let g = -1; CURRICULUM.forEach((st, i) => { if (st.chars.some((c) => progress[c.char] && progress[c.char].mastered)) g = i; }); return g; }, [progress]);
  const dailyLimit = Math.max(0, curGrade + 1); // 수호대장 11 … 10급 1 (바닥값 없음)

  const [bi, setBi] = useState(0);
  const [seal, setSeal] = useState(0);
  const [contrib, setContrib] = useState({});
  const [charged, setCharged] = useState({});
  const [dDate, setDDate] = useState(raidToday());
  const [dN, setDN] = useState(0);
  const [used, setUsed] = useState({}); // 카드별 마지막 사용 시각 — 수련 순환용
  const [sel, setSel] = useState(null);
  const [busy, setBusy] = useState(false);
  const [quiz, setQuiz] = useState(null);
  const [imgBroken, setImgBroken] = useState(false);
  const [msg, setMsg] = useState("출전 카드를 골라 «도전!»을 누르세요");
  const [clash, setClash] = useState("");
  const [fx, setFx] = useState(null); // {id,type:'dmg'|'star'|'bok',n,crit}
  const [daily, setDaily] = useState({}); // 오늘의 용사: key -> 오늘 데미지
  const fxTimer = React.useRef(null);
  const clashTimer = React.useRef(null);
  const flashClash = (t) => { setClash(t); clearTimeout(clashTimer.current); clashTimer.current = setTimeout(() => setClash(""), 2500); };
  const timerRef = React.useRef(null);
  const prevBi = React.useRef(0);
  const loadedRef = React.useRef(false);
  const initedRef = React.useRef(false);

  const chargedCount = () => Object.keys(charged).length;
  const saveMyRaid = (patch) => { if (_db) dbref("students/" + key + "/raid").update(patch).catch(() => {}); };

  // 첫 장전 세트
  const firstArm = () => { const o = {}; [...deck].sort((a, b) => ((used[a.char] || 0) - (used[b.char] || 0))).slice(0, RAID_SLOT).forEach((c) => { o[c.char] = true; }); return o; };

  useEffect(() => {
    if (!_db) { setCharged(firstArm()); return; }
    const sref = dbref("raid/seal");
    const h1 = sref.on("value", (s) => { const v = s.val() || { bi: 0, n: 0 }; if (!loadedRef.current) { loadedRef.current = true; prevBi.current = v.bi || 0; } setBi(v.bi || 0); setSeal(v.n || 0); });
    const cref = dbref("raid/contrib");
    const h2 = cref.on("value", (s) => setContrib(s.val() || {}));
    const dref = dbref("raid/daily/" + raidToday());
    const h4 = dref.on("value", (s) => setDaily(s.val() || {}));
    const mref = dbref("students/" + key + "/raid");
    const h3 = mref.on("value", (s) => {
      const v = s.val();
      if (!v && !initedRef.current && deck.length) { initedRef.current = true; mref.set({ charged: firstArm(), dDate: raidToday(), dN: 0 }).catch(() => {}); return; }
      if (!v) return;
      // 출전 카드가 한 장도 없으면 자동 재장전 (기존 학생 빈 슬롯 복구)
      const curCharged = v.charged || {};
      const liveCount = deck.filter((c) => curCharged[c.char]).length;
      if (liveCount === 0 && !initedRef.current && deck.length) {
        initedRef.current = true;
        const o = firstArm();
        setCharged(o); saveMyRaid({ charged: o });
        setUsed(v.used || {});
        const t0 = raidToday(); setDDate(v.dDate || t0); setDN(v.dDate === t0 ? (v.dN || 0) : 0);
        return;
      }
      setCharged(curCharged);
      setUsed(v.used || {});
      const t = raidToday();
      setDDate(v.dDate || t);
      setDN(v.dDate === t ? (v.dN || 0) : 0);
    });
    return () => { sref.off("value", h1); cref.off("value", h2); dref.off("value", h4); mref.off("value", h3); };
  }, [key, deck.length]);

  // 마왕이 봉인되어 다음 마왕으로 넘어가면 슬롯 재장전(보상)
  useEffect(() => {
    if (bi > prevBi.current) { const o = firstArm(); setCharged(o); saveMyRaid({ charged: o }); setMsg("🎉 마왕 봉인 성공! 슬롯이 다시 장전됐어요. 다음 마왕 등장!"); }
    prevBi.current = bi; setImgBroken(false);
  }, [bi]);

  const myContrib = (contrib[bi] || {})[key] || 0;
  const boss = RAID_BOSSES[Math.min(bi, RAID_BOSSES.length - 1)];
  const allSealed = bi >= RAID_BOSSES.length - 1 && seal >= boss.hp;
  const todayN = (dDate === raidToday() ? dN : 0);
  const pct = allSealed ? 0 : raidPct(seal, boss.hp);
  const nearSeal = !allSealed && pct <= 3;

  const bumpSeal = (dmg) => {
    if (_db) {
      dbref("raid/seal").transaction((cur) => {
        cur = cur || { bi: 0, n: 0 };
        const hp = (RAID_BOSSES[cur.bi] || RAID_BOSSES[0]).hp;
        if (cur.n + dmg >= hp) { return cur.bi + 1 <= RAID_BOSSES.length - 1 ? { bi: cur.bi + 1, n: 0 } : { bi: cur.bi, n: hp }; }
        return { bi: cur.bi, n: cur.n + dmg };
      }).catch(() => {});
      dbref("raid/contrib/" + bi + "/" + key).transaction((n) => (n || 0) + dmg).catch(() => {});
      dbref("raid/daily/" + raidToday() + "/" + key).transaction((n) => (n || 0) + dmg).catch(() => {});
    } else {
      setContrib((c) => ({ ...c, [bi]: { ...(c[bi] || {}), [key]: ((c[bi] || {})[key] || 0) + dmg } }));
      setSeal((s) => { const hp = RAID_BOSSES[bi].hp; if (s + dmg >= hp) { if (bi < RAID_BOSSES.length - 1) setBi((b) => b + 1); return bi < RAID_BOSSES.length - 1 ? 0 : hp; } return s + dmg; });
      setDaily((d) => ({ ...d, [key]: (d[key] || 0) + dmg }));
    }
  };

  const showFx = (f) => { const o = { ...f, id: Date.now() }; setFx(o); clearTimeout(fxTimer.current); fxTimer.current = setTimeout(() => setFx(null), f.type === "bok" ? 3200 : 1700); };
  const giveStar = (card) => {
    if (_db) dbref("students/" + key + "/progress/" + card.char + "/stars").transaction((s) => (s || 1) + 1).catch(() => {});
    setMsg((m) => m + " ⭐ 행운의 별! " + card.char + " 카드가 ★" + (card.stars + 1) + "이 됐어요!");
    showFx({ type: "star" });
  };
  const giveBok = () => {
    if (_db) dbref("giftLog").push({ student, kind: "raid", ts: Date.now(), given: false }).catch(() => {});
    setMsg((m) => m + " 🧧 복(福)이 내렸다!! 선생님께 선물을 받으세요!");
    showFx({ type: "bok" });
  };
  const rollFortune = (card) => {
    const r = Math.random();
    if (r < RAID_BOK_P) giveBok();
    else if (r < RAID_BOK_P + RAID_STAR_P) giveStar(card);
  };

  const runQuiz = (q) => {
    setQuiz({ ...q, locked: false, wrong: null });
    clearTimeout(timerRef.current);
    if (q.timed) timerRef.current = setTimeout(() => { setQuiz(null); q.onResult(false); }, q.limit);
  };
  const pick = (opt) => {
    if (!quiz || quiz.locked) return;
    const ok = opt === quiz.correct; const q = quiz;
    clearTimeout(timerRef.current);
    setQuiz({ ...quiz, locked: true, wrong: ok ? null : opt });
    setTimeout(() => { setQuiz(null); q.onResult(ok); }, ok ? 130 : 540);
  };

  const startAttack = (card, boon) => {
    const correct = card.meaning;
    const others = sample(deck.filter((c) => c.char !== card.char), 2).map((c) => c.meaning);
    const prefix = boon === "win" ? "✨ 힘력 한자! 맞히면 무조건 치명타 — " : boon === "again" ? "✨ 힘력 한자! 이번 도전은 공짜 — " : "⚔ 3초 안에! ";
    runQuiz({ kind: "attack", head: card.char, qtext: prefix + "<b>" + card.char + "</b>의 뜻과 음을 맞혀요", options: shuffle([correct, ...others]), correct, timed: true, limit: 3000, onResult: (ok) => (ok ? doAttack(card, boon) : attackFail(card)) });
  };
  const doAttack = (card, boon) => {
    setBusy(true);
    const b = RAID_BOSSES[bi];
    const nc = { ...charged }; delete nc[card.char]; setCharged(nc);
    const ts = Date.now(); setUsed((u) => ({ ...u, [card.char]: ts })); saveMyRaid({ charged: nc, ["used/" + card.char]: ts });
    const maPw = b.pool[(Math.random() * b.pool.length) | 0];
    setClash("🥋  ⚡  👹"); setMsg("…");
    setTimeout(() => {
      const crit = (boon === "win") || (card.pw >= maPw);
      const dmg = crit ? 2 : 1;
      const free = (boon === "again") ? " ✨ 힘력 한자 — 이번 도전은 공짜!" : "";
      bumpSeal(dmg);
      const pctAfter = raidPct(seal + dmg, b.hp);
      const line = crit ? pickMsg(CRIT_MSGS) : (pctAfter <= 20 ? pickMsg(LOW_MSGS) : pickMsg(HIT_MSGS));
      flashClash(crit ? "💥 치명타!!" : "✦ 명중! ✦");
      setMsg((boon === "win" ? "✨ 힘력 한자! " : "") + line + " 봉인 +" + dmg + " (내 힘 " + card.pw + " vs 마왕 " + maPw + "). " + card.char + "는 «대기»로." + free);
      showFx({ type: "dmg", n: dmg, crit });
      rollFortune(card);
      setSel(null); setBusy(false);
    }, 720);
  };
  const attackFail = (card) => { flashClash("👹 회피!"); setMsg(pickMsg(DODGE_MSGS) + " (" + card.char + " 카드는 출전 그대로, 도전 기회만 1 줄었어요.)"); rollFortune(card); };

  const onChallenge = () => {
    if (sel == null || busy || !charged[sel] || allSealed) return;
    if (myContrib >= boss.cap) { setMsg("이 마왕엔 더 기여할 수 없어요 (상한 " + boss.cap + ") — 친구들 차례!"); return; }
    if (todayN >= dailyLimit) { setMsg("오늘 도전을 다 썼어요 (" + dailyLimit + "회). 내일 다시 만나요!"); return; }
    const boon = (Math.random() < RAID_LUCKY_P) ? (Math.random() < 0.5 ? "win" : "again") : null;
    if (boon !== "again") { const t = raidToday(); const nN = (dDate === t ? dN : 0) + 1; setDDate(t); setDN(nN); saveMyRaid({ dDate: t, dN: nN }); }
    const card = deck.find((c) => c.char === sel); startAttack(card, boon);
  };

  const armCard = (card) => { if (chargedCount() >= RAID_SLOT) return; const nc = { ...charged, [card.char]: true }; setCharged(nc); saveMyRaid({ charged: nc }); };
  const startTrain = (card) => {
    if (busy) return;
    if (!trainable.has(card.char)) { setMsg(card.char + " 카드는 아직 쉬는 중이에요. 앞 차례 카드부터 수련해요!"); return; }
    if (chargedCount() >= RAID_SLOT) { setMsg("출전 슬롯이 꽉 찼어요 (" + RAID_SLOT + "/" + RAID_SLOT + "). 먼저 공격해서 슬롯을 비우세요."); return; }
    const correct = card.meaning;
    const others = sample(deck.filter((c) => c.char !== card.char), 2).map((c) => c.meaning);
    runQuiz({ kind: "t1", head: card.char, step: "수련 1/2 · 음과 뜻", qtext: "이 한자의 <b>뜻과 음</b>은?", options: shuffle([correct, ...others]), correct, timed: false, onResult: (ok) => (ok ? trainStep2(card) : trainFail(card)) });
  };
  const trainStep2 = (card) => {
    const ws = card.words || [];
    if (!ws.length) { armCard(card); setMsg("⚡ 수련 완료! " + card.char + " 카드가 «출전»으로 장전됐어요."); return; }
    const w = ws[(Math.random() * ws.length) | 0];
    const chObj = ALL_CHARS.find((c) => c.char === card.char) || { words: ws };
    const correct = w.def; const others = distractDefs(chObj, correct, 2);
    runQuiz({ kind: "t2", head: w.hanja || w.word, step: "수련 2/2 · 낱말 뜻", qtext: "낱말 「" + (w.hanja || w.word) + "」의 뜻은?", options: shuffle([correct, ...others]), correct, timed: false, onResult: (ok) => { if (ok) { armCard(card); setMsg("⚡ 수련 완료! " + card.char + " 카드가 «출전»으로 장전됐어요."); } else trainFail(card); } });
  };
  const trainFail = (card) => setMsg("수련 실패… " + card.char + "의 «수련»을 다시 눌러 도전해요.");

  const waitQueue = useMemo(() => deck.filter((c) => !charged[c.char]).sort((a, b) => ((used[a.char] || 0) - (used[b.char] || 0))), [deck, charged, used]);
  const trainable = useMemo(() => new Set(waitQueue.slice(0, RAID_TRAIN_WINDOW).map((c) => c.char)), [waitQueue]);
  const sortedDeck = useMemo(() => [...deck.filter((c) => charged[c.char]), ...waitQueue], [deck, charged, waitQueue]);

  const chip = { fontSize: 12, color: "#F0D98C", background: "linear-gradient(150deg,#2c2620,#15110d)", border: "1.5px solid #8A6A22", borderRadius: 99, padding: "6px 12px" };

  return (
    <div style={{ minHeight: "100vh", margin: "0 -16px", padding: "0 14px 30px", background: "radial-gradient(125% 80% at 50% -5%,#3a3228,#1b1611 50%,#0b0906)", color: "#F0E6CE" }}>
      <style>{`
        @keyframes hrshrink { from{width:100%} to{width:0} }
        @keyframes hrshake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
        @keyframes hrpop { 0%{transform:scale(.3) translateY(10px);opacity:0} 55%{transform:scale(1.3);opacity:1} 100%{transform:scale(1) translateY(-8px);opacity:1} }
        @keyframes hrbok { 0%{transform:scale(.2) rotate(-10deg);opacity:0} 60%{transform:scale(1.15) rotate(2deg)} 100%{transform:scale(1) rotate(0);opacity:1} }
        @keyframes hrglowbar { 0%,100%{box-shadow:0 0 6px rgba(244,208,63,.45)} 50%{box-shadow:0 0 20px rgba(244,208,63,.95)} }
        @keyframes hrstar { 0%{transform:scale(.15);opacity:0} 30%{transform:scale(1.45);opacity:1} 50%{transform:scale(.95)} 62%{transform:scale(1.1)} 78%{transform:scale(1.55);opacity:1} 100%{transform:scale(2.3);opacity:0} }
        @keyframes hrclash { 0%{transform:scale(.3);opacity:0} 45%{transform:scale(1.4)} 68%{transform:scale(.92)} 100%{transform:scale(1);opacity:1} }
        .hropt{display:block;width:100%;margin-top:8px;font-family:${FONT};font-size:15px;cursor:pointer;border:1.5px solid #6b551f;background:#2a2016;color:#F0E6CE;border-radius:12px;padding:11px;}
        .hrcard{position:relative;background:radial-gradient(circle at 50% 28%,#4a4230,#15110d);border:2px solid #B8923A;border-radius:13px;padding:8px 4px 6px;text-align:center;cursor:pointer;}
        .hrcard.wait{filter:grayscale(1) brightness(.55);border-color:#555;cursor:default;}
        .hrtrain{margin-top:3px;font-size:9px;color:#1a120a;background:#C9A24A;border:none;border-radius:8px;padding:3px 5px;cursor:pointer;width:100%;}
      `}</style>

      <div style={{ display: "flex", alignItems: "center", gap: 8, paddingTop: 14 }}>
        <button onClick={onBack} style={{ background: "none", border: "1px solid #6b551f", color: "#C9A24A", borderRadius: 10, padding: "6px 10px", cursor: "pointer", fontFamily: FONT }}>‹ 홈</button>
        <div style={{ fontFamily: DISPLAY, fontSize: 18, color: "#EBCB67" }}>한자 마왕 봉인전</div>
      </div>

      {deck.length === 0 ? (
        <div style={{ textAlign: "center", marginTop: 60, color: "#B9A36E", fontSize: 14, lineHeight: 1.8 }}>아직 도감에 모은 한자가 없어요.<br />«게임 시작»에서 한자를 익히면 출전할 수 있어요!</div>
      ) : (
        <div>
          <div style={{ marginTop: 12, background: "linear-gradient(160deg,#2c2018,#160d0a)", border: "2px solid " + boss.border, borderRadius: 20, padding: "12px 14px 14px", textAlign: "center" }}>
            <div style={{ fontSize: 11, color: "#B9A36E", letterSpacing: 1 }}>시즌 {Math.min(bi + 1, RAID_BOSSES.length)} / {RAID_BOSSES.length}</div>
            <div style={{ height: 132, display: "flex", alignItems: "flex-end", justifyContent: "center" }}>
              {imgBroken
                ? <div style={{ fontFamily: BRUSH, fontSize: 72, color: "#E8A86B" }}>{boss.han}</div>
                : <img src={RAID_IMG(bi)} alt={boss.name} onError={() => setImgBroken(true)} style={{ maxHeight: 128, maxWidth: "82%", filter: "drop-shadow(0 5px 10px rgba(0,0,0,.55))" }} />}
            </div>
            <div style={{ fontSize: 18, color: "#E8A86B", fontWeight: "bold" }}>{boss.name} ({boss.han})</div>
            <div style={{ fontSize: 11, color: nearSeal ? "#F4D03F" : "#9a8a60", marginBottom: 4, fontWeight: nearSeal ? "bold" : "normal" }}>{nearSeal ? "⚡ 봉인 직전!! 마왕이 무릎을 꿇었다!" : "반 전체가 함께 마왕의 기운을 깎는 중"}</div>
            <div style={{ marginTop: 4, background: "#120a08", border: "1.5px solid " + (nearSeal ? "#F4D03F" : "#5a3a1a"), borderRadius: 99, height: 20, overflow: "hidden", position: "relative", animation: nearSeal ? "hrglowbar 1s infinite" : "none" }}>
              <div style={{ height: "100%", width: pct + "%", background: nearSeal ? "linear-gradient(90deg,#F4D03F,#FFF3B0)" : "linear-gradient(90deg,#7a1f1a,#E0533A)", transition: "width .5s" }} />
              <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", fontSize: 11.5, color: "#fff", textShadow: "0 1px 2px #000" }}>마왕 HP {pct}%</div>
            </div>
            <div style={{ fontSize: 11, color: "#B9A36E", marginTop: 5 }}>반 전체가 함께 무찌르는 마왕의 기운</div>
          </div>

          <div style={{ display: "flex", gap: 7, justifyContent: "center", marginTop: 12, flexWrap: "wrap" }}>
            <span style={chip}>오늘 남은 도전 <b style={{ color: "#F4D03F" }}>{Math.max(0, dailyLimit - todayN)}</b>회</span>
            <span style={chip}>출전 <b style={{ color: "#F4D03F" }}>{chargedCount()}</b>/{RAID_SLOT}</span>
            <span style={chip}>내 기여 {myContrib >= boss.cap ? <b style={{ color: "#7BD493" }}>완료!</b> : <><b style={{ color: "#F4D03F" }}>{myContrib}</b>/{boss.cap}</>}</span>
          </div>
          {!allSealed && myContrib >= boss.cap && (
            <div style={{ textAlign: "center", fontSize: 12.5, color: "#7BD493", marginTop: 9, lineHeight: 1.5 }}>🙌 이 마왕에 내 몫을 다 채웠어요!<br />이제 친구들 차례 — 다음 마왕에서 다시 만나요.</div>
          )}
          {(() => {
            const top = Object.entries(daily).sort((a, b) => b[1] - a[1]).slice(0, 3);
            if (!top.length) return null;
            const medals = ["🥇", "🥈", "🥉"];
            return (
              <div style={{ marginTop: 9 }}>
                <div style={{ textAlign: "center", fontSize: 10.5, color: "#7d6e4e", letterSpacing: 1 }}>오늘의 용사</div>
                <div style={{ display: "flex", gap: 7, justifyContent: "center", marginTop: 4, flexWrap: "wrap" }}>
                  {top.map(([n, v], i) => <span key={n} style={{ ...chip, fontSize: 11.5 }}>{medals[i]} {n} <b style={{ color: "#F4D03F" }}>{v}</b></span>)}
                </div>
              </div>
            );
          })()}

          <div style={{ marginTop: 12, background: "#16110c", border: "2px solid #6b551f", borderRadius: 18, padding: 14, position: "relative" }}>
            {fx && fx.type === "dmg" && <div key={fx.id} style={{ position: "absolute", top: 4, right: 22, fontFamily: DISPLAY, fontWeight: "bold", fontSize: fx.crit ? 36 : 27, color: fx.crit ? "#FF6B4A" : "#F4D03F", textShadow: "0 2px 5px #000", animation: "hrpop .55s ease-out both", pointerEvents: "none", zIndex: 5 }}>-{fx.n}</div>}
            {fx && fx.type === "star" && (
              <div key={fx.id + "s"} style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", pointerEvents: "none", zIndex: 6 }}>
                <div style={{ textAlign: "center", animation: "hrstar 1.5s ease-out both" }}>
                  <div style={{ fontSize: 68, lineHeight: 1, filter: "drop-shadow(0 0 16px rgba(244,208,63,.95))" }}>⭐</div>
                  <div style={{ fontFamily: DISPLAY, fontSize: 16, color: "#F4D03F", fontWeight: "bold", textShadow: "0 1px 5px #000", marginTop: 2 }}>행운의 별!</div>
                </div>
              </div>
            )}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-around" }}>
              <div style={{ width: 84, textAlign: "center" }}>
                <div style={{ width: 74, height: 74, margin: "0 auto", borderRadius: 14, display: "grid", placeItems: "center", fontSize: 36, background: "radial-gradient(circle at 50% 30%,#514732,#14110c)", border: "2px solid #C9A24A", color: "#F4E7B0", fontFamily: BRUSH }}>{sel || "?"}</div>
                <div style={{ fontSize: 11, color: "#B9A36E", marginTop: 4 }}>{sel ? raidStars((deck.find((c) => c.char === sel) || {}).stars || 1) : "출전 카드 선택"}</div>
              </div>
              <div style={{ fontSize: 20, color: "#E8A86B", fontWeight: "bold" }}>⚔</div>
              <div style={{ width: 84, textAlign: "center" }}>
                <div key={fx ? fx.id : 0} style={{ width: 74, height: 74, margin: "0 auto", borderRadius: 14, display: "grid", placeItems: "center", overflow: "hidden", background: "radial-gradient(circle at 50% 30%,#3a1614,#120807)", border: "2px solid #7a1f1a", color: "#E8A86B", fontFamily: BRUSH, fontSize: 30, animation: (fx && fx.type === "dmg" && fx.crit) ? "hrshake .4s" : "none" }}>
                  {imgBroken ? boss.han : <img src={RAID_IMG(bi)} alt="" onError={() => setImgBroken(true)} style={{ width: "100%", height: "100%", objectFit: "contain" }} />}
                </div>
                <div style={{ fontSize: 11, color: "#B9A36E", marginTop: 4 }}>마왕</div>
              </div>
            </div>
            <div key={clash + "|" + (fx ? fx.id : 0)} style={{ textAlign: "center", fontSize: clash.includes("치명타") ? 27 : 24, height: 30, fontWeight: "bold", color: clash.includes("치명타") ? "#FF6B4A" : "#E8A86B", textShadow: clash.includes("치명타") ? "0 0 12px rgba(255,107,74,.6)" : "none", animation: clash ? "hrclash .5s ease-out both" : "none" }}>{clash}</div>
            <div style={{ textAlign: "center", fontSize: 13.5, marginTop: 6, lineHeight: 1.6, minHeight: 20, color: "#F0E6CE" }}>{allSealed ? "🏆 모든 마왕을 봉인했어요! 한자 수호대가 글자 세상을 지켜냈습니다." : msg}</div>
          </div>

          <button onClick={onChallenge} disabled={busy || allSealed || sel == null || !charged[sel] || todayN >= dailyLimit || myContrib >= boss.cap} style={{ display: "block", width: "100%", marginTop: 10, fontFamily: DISPLAY, fontSize: 16, fontWeight: "bold", cursor: "pointer", border: "none", borderRadius: 14, padding: 13, color: "#1a120a", background: (busy || allSealed || sel == null || !charged[sel] || todayN >= dailyLimit || myContrib >= boss.cap) ? "#5a4d2c" : "linear-gradient(180deg,#F4D03F,#C9A24A)" }}>도전!</button>

          <div style={{ fontSize: 13, color: "#B9A36E", margin: "16px 0 4px", display: "flex", justifyContent: "space-between" }}>
            <span>📖 내 도감 <span style={{ color: "#7d6e4e", fontSize: 11 }}>({deck.length}자, 영구)</span></span>
            <span style={{ fontSize: 11, color: "#7d6e4e" }}>출전 {chargedCount()} / 대기 {deck.length - chargedCount()}</span>
          </div>
          <div style={{ fontSize: 10.5, color: "#7d6e4e", marginBottom: 8, lineHeight: 1.5 }}>한 번에 최대 {RAID_SLOT}장만 «출전» 가능. 공격한 카드는 줄 맨 뒤로 쉬러 가요. «수련»은 앞 차례 {RAID_TRAIN_WINDOW}장만 가능 — 모든 한자가 골고루 출전!</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8 }}>
            {sortedDeck.map((c) => {
              const on = !!charged[c.char];
              return (
                <div key={c.char} className={"hrcard" + (on ? "" : " wait") + (sel === c.char ? " sel" : "")} style={sel === c.char ? { outline: "3px solid #F4D03F", outlineOffset: 1 } : null}
                  onClick={on && !busy ? () => { setSel(c.char); setClash(""); setMsg("«도전!»을 눌러 3초 안에 음·뜻을 맞혀요"); } : undefined}>
                  <div style={{ fontFamily: BRUSH, fontSize: 25, color: "#F4E7B0", lineHeight: 1.1 }}>{c.char}</div>
                  <div style={{ fontSize: 10, color: "#F4D03F", marginTop: 1 }}>{raidStars(c.stars)}</div>
                  <div style={{ fontSize: 8.5, marginTop: 2, color: on ? "#7BD493" : (trainable.has(c.char) ? "#E8C45A" : "#888") }}>{on ? "출전" : (trainable.has(c.char) ? "대기" : "휴식")}</div>
                  {!on && (trainable.has(c.char)
                    ? <button className="hrtrain" onClick={(e) => { e.stopPropagation(); startTrain(c); }}>수련</button>
                    : <button className="hrtrain" style={{ opacity: 0.3, cursor: "default" }} onClick={(e) => e.stopPropagation()}>쉬는 중</button>)}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {fx && fx.type === "bok" && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(20,12,4,.82)", display: "grid", placeItems: "center", zIndex: 70, pointerEvents: "none" }}>
          <div style={{ textAlign: "center", animation: "hrbok .8s ease-out both" }}>
            <div style={{ fontFamily: BRUSH, fontSize: 130, color: "#F4D03F", textShadow: "0 0 50px rgba(244,208,63,.65)" }}>福</div>
            <div style={{ fontFamily: DISPLAY, fontSize: 19, color: "#F0E6CE", marginTop: 6 }}>복이 내렸다!! 선생님께 선물을 받으세요 🧧</div>
          </div>
        </div>
      )}

      {quiz && (
        <div onClick={(e) => { if (e.target === e.currentTarget && !quiz.timed) setQuiz(null); }} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.72)", display: "grid", placeItems: "center", padding: 20, zIndex: 60 }}>
          <div style={{ background: "#1d1610", border: "2px solid #C9A24A", borderRadius: 20, padding: 20, maxWidth: 340, width: "100%", textAlign: "center" }}>
            {quiz.step && <div style={{ fontSize: 11, color: "#C9A24A", letterSpacing: 1 }}>{quiz.step}</div>}
            <div style={{ fontFamily: BRUSH, fontSize: 46, color: "#F4E7B0", marginTop: 2 }}>{quiz.head}</div>
            <div style={{ fontSize: 14, color: "#D8C79A", margin: "6px 0 10px" }} dangerouslySetInnerHTML={{ __html: quiz.qtext }} />
            {quiz.timed && <div style={{ height: 9, background: "#3a2a1a", borderRadius: 99, margin: "0 0 12px", overflow: "hidden" }}><div style={{ height: "100%", background: "linear-gradient(90deg,#7BD493,#F4D03F 55%,#E58F7A)", animation: "hrshrink " + quiz.limit + "ms linear forwards" }} /></div>}
            {quiz.options.map((o, i) => (
              <button key={i} className="hropt" onClick={() => pick(o)} style={quiz.wrong === o ? { borderColor: "#E58F7A" } : null}>{o}{quiz.wrong === o ? "  ✗" : ""}</button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}


const pillStyle = { display: "inline-flex", alignItems: "center", gap: 5, fontFamily: DISPLAY, fontSize: 14, background: "#fff", border: "2px solid #EADFC9", borderRadius: 999, padding: "5px 13px", color: "#5A4A33" };
const Pill = ({ children }) => <span style={pillStyle}>{children}</span>;

function BeltIcon({ belt, size = 22 }) {
  if (belt.split) {
    return (
      <span style={{ display: "inline-block", width: size, height: size, borderRadius: Math.max(3, size * 0.16),
        background: `linear-gradient(to right, ${belt.split[0]} 0 50%, ${belt.split[1]} 50% 100%)`,

    );

}

function TeacherGate({ onOk, onBack }) {
  const [pin, setPin] = useState("");
  const [err, setErr] = useState("");
  const submit = () => { if (pin === teacherPin()) onOk(); else { setErr("비밀번호가 틀렸어요"); setPin(""); } };
  const inputStyle = { width: "100%", boxSizing: "border-box", fontFamily: FONT, fontSize: 22, letterSpacing: 8, textAlign: "center", padding: "12px 14px", borderRadius: 14, border: "2px solid #EADFC9", background: "#FCFAF4", outline: "none", marginTop: 10 };
  return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", justifyContent: "center", paddingBottom: 40 }}>
      <button className="btn" onClick={onBack} style={{ alignSelf: "flex-start", display: "inline-flex", alignItems: "center", gap: 3, cursor: "pointer", fontFamily: DISPLAY, fontSize: 14, background: "none", border: "none", color: "#7A6A52", marginTop: 14 }}><ChevronLeft size={20} /> 메뉴</button>
      <div style={{ textAlign: "center" }}>
        <div style={{ width: 100, height: 100, margin: "0 auto", borderRadius: 26, background: "#fff", border: "3px solid #D6342C", display: "grid", placeItems: "center", boxShadow: "0 10px 0 rgba(0,0,0,.06)", color: "#D6342C" }}>
          <Lock size={44} />
        </div>
        <h1 style={{ fontFamily: DISPLAY, fontSize: 28, margin: "16px 0 2px" }}>교사용 대시보드</h1>
        <p style={{ color: "#9A8A72", fontSize: 13, margin: 0 }}>선생님 비밀번호를 입력하세요</p>
      </div>
      <div style={{ marginTop: 22, background: "#fff", border: "2px solid #EADFC9", borderRadius: 22, padding: 18, boxShadow: "0 6px 0 rgba(0,0,0,.05)" }}>
        <input value={"●".repeat(pin.length)} autoFocus inputMode="numeric" onChange={(e) => { const v = e.target.value; if (v.length < pin.length) setPin(pin.slice(0, v.length)); else setPin((pin + v.slice(pin.length).replace(/[^0-9]/g, "")).slice(0, 6)); setErr(""); }} onKeyDown={(e) => e.key === "Enter" && submit()} placeholder="● ● ● ●" style={inputStyle} />
        {err && <div style={{ color: "#C0392B", fontSize: 12.5, marginTop: 8, textAlign: "center" }}>{err}</div>}
        <button className="btn" onClick={submit} disabled={!pin} style={{ width: "100%", marginTop: 14, cursor: pin ? "pointer" : "not-allowed", border: "none", borderRadius: 16, padding: "14px", fontFamily: DISPLAY, fontSize: 17, color: "#fff", background: pin ? "#D6342C" : "#E0B3AF", boxShadow: pin ? "0 5px 0 rgba(0,0,0,.12)" : "none" }}>들어가기 →</button>
      </div>
    </div>
  );
}

function TeacherDashboard({ profiles, log, onToggle, lastSeen = {}, unlockAll, onToggleLock, raidOn, onToggleRaid, onRefresh, onDeleteStudent, onBack }) {
  const [tab, setTab] = useState("students"); // "students" | "gifts"
  const [refreshing, setRefreshing] = useState(false);
  const pending = log.filter((e) => !e.given).length;
  const fmt = (ts) => { const d = new Date(ts); return `${d.getHours()}:${String(d.getMinutes()).padStart(2, "0")}`; };
  const isToday = (ts) => { if (!ts) return false; const d = new Date(ts), n = new Date(); return d.getFullYear() === n.getFullYear() && d.getMonth() === n.getMonth() && d.getDate() === n.getDate(); };
  const fmtSeen = (ts) => {
    if (!ts) return "접속 기록 없음";
    const d = new Date(ts), now = new Date();
    const hm = `${d.getHours()}:${String(d.getMinutes()).padStart(2, "0")}`;
    const day0 = (x) => new Date(x.getFullYear(), x.getMonth(), x.getDate()).getTime();
    const diff = Math.round((day0(now) - day0(d)) / 86400000);
    if (diff === 0) return `오늘 ${hm}`;
    if (diff === 1) return `어제 ${hm}`;
    if (diff < 7) return `${diff}일 전 ${hm}`;
    return `${d.getMonth() + 1}월 ${d.getDate()}일 ${hm}`;
  };

  const students = Object.entries(profiles).map(([name, prog]) => {
    const mastered = Object.values(prog).filter((p) => p.mastered).length;
    const stars = Object.values(prog).reduce((s, p) => s + (p.stars || 0), 0);
    const todayN = Object.values(prog).filter((p) => p.mastered && isToday(p.t)).length;
    const grades = CURRICULUM.map((st) => {
      const done = st.chars.filter((c) => prog[c.char]?.mastered).length;
      return { done, total: st.chars.length };
    });
    const curGrade = (() => { for (let i = grades.length - 1; i >= 0; i--) if (grades[i].done > 0) return i; return -1; })();
    return { name, mastered, stars, grades, curGrade, isMaster: mastered >= ALL_CHARS.length, seen: lastSeen[name] || 0, todayN };
  }).sort((a, b) => b.mastered - a.mastered || b.stars - a.stars);

  const TabBtn = ({ id, children }) => (
    <button className="btn" onClick={() => setTab(id)} style={{ flex: 1, cursor: "pointer", fontFamily: DISPLAY, fontSize: 14, borderRadius: 12, padding: "9px 8px", border: "none", color: tab === id ? "#fff" : "#7A6A52", background: tab === id ? "#8A6A12" : "#F0E8D6" }}>{children}</button>
  );

  return (
    <div style={{ paddingBottom: 30 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, paddingTop: 18 }}>
        <button className="btn" onClick={onBack} style={{ background: "none", border: "none", cursor: "pointer", color: "#5A4A33" }}><ChevronLeft size={26} /></button>
        <div>
          <h2 style={{ fontFamily: DISPLAY, fontSize: 23, margin: 0 }}>교사용 대시보드</h2>
          <div style={{ fontSize: 12, color: "#9A8A72" }}>{_db ? "모든 학생 · 실시간" : "이 기기·이번 세션 기준"}</div>
        </div>
        <button className="btn" onClick={() => { setRefreshing(true); onRefresh(); setTimeout(() => setRefreshing(false), 900); }} disabled={refreshing} style={{ marginLeft: "auto", cursor: "pointer", fontFamily: DISPLAY, fontSize: 13, borderRadius: 12, padding: "8px 12px", border: "2px solid #C9A227", background: "#FBF3DC", color: "#8A6A12" }}>{refreshing ? "갱신 중…" : "↻ 새로고침"}</button>
      </div>
      <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
        <TabBtn id="students">👥 학생 현황 {students.length}</TabBtn>
        <TabBtn id="gifts">🎁 복 선물 {pending ? `· 대기 ${pending}` : log.length}</TabBtn>
      </div>

      <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 12, background: "#fff", border: "2px solid #EADFC9", borderRadius: 14, padding: "10px 14px" }}>
        <div style={{ flex: 1 }}>
          <div style={{ fontFamily: DISPLAY, fontSize: 14.5 }}>단계 잠금</div>
          <div style={{ fontSize: 11.5, color: "#9A8A72", marginTop: 2 }}>{unlockAll ? "모두 열림 — 학생이 아무 급이나 들어갈 수 있어요" : "순서 잠금 — 앞 급을 깨야 다음 급이 열려요"}</div>
        </div>
        <button className="btn" onClick={onToggleLock} style={{ cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 5, fontFamily: DISPLAY, fontSize: 14, borderRadius: 12, padding: "9px 14px", border: `2px solid ${unlockAll ? "#2E9E4F" : "#C9A227"}`, color: unlockAll ? "#1C6E37" : "#8A6A12", background: unlockAll ? "#E8F6EC" : "#FBF3DC" }}>
          <Lock size={15} /> {unlockAll ? "모두 열림" : "순서 잠금"}
        </button>
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 12, background: "#fff", border: "2px solid #EADFC9", borderRadius: 14, padding: "10px 14px" }}>
        <div style={{ flex: 1 }}>
          <div style={{ fontFamily: DISPLAY, fontSize: 14.5 }}>한자 마왕 봉인전</div>
          <div style={{ fontSize: 11.5, color: "#9A8A72", marginTop: 2 }}>{raidOn ? "켜짐 — 학생 홈에 봉인전 버튼이 보여요" : "꺼짐 — 학생 홈에 표시되지 않아요"}</div>
        </div>
        <button className="btn" onClick={onToggleRaid} style={{ cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 5, fontFamily: DISPLAY, fontSize: 14, borderRadius: 12, padding: "9px 14px", border: `2px solid ${raidOn ? "#2E9E4F" : "#C9A227"}`, color: raidOn ? "#1C6E37" : "#8A6A12", background: raidOn ? "#E8F6EC" : "#FBF3DC" }}>
          {raidOn ? "켜짐" : "꺼짐"}
        </button>
      </div>

      {tab === "students" ? (
        students.length === 0 ? (
          <div style={{ marginTop: 28, textAlign: "center", color: "#A99B82", fontSize: 14 }}>아직 입장한 학생이 없어요.</div>
        ) : (
          <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 10 }}>
            {students.map((s) => (
              <div key={s.name} style={{ background: "#fff", border: `2px solid ${s.isMaster ? "#C9A227" : "#EADFC9"}`, borderRadius: 16, padding: "12px 14px" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <div style={{ flex: 1, fontFamily: DISPLAY, fontSize: 17 }}>🥋 {s.name} {s.isMaster && <span>👑</span>}</div>
                  {s.todayN > 0 && <span style={{ fontSize: 11.5, fontFamily: DISPLAY, color: "#1C6E37", background: "#E8F6EC", border: "1.5px solid #2E9E4F", borderRadius: 99, padding: "2px 8px" }}>오늘 +{s.todayN}</span>}
                  <span style={{ fontSize: 12.5, color: "#9A8A72" }}>⭐ {s.stars}</span>
                  <span style={{ fontSize: 12.5, color: "#5A4A33", fontFamily: DISPLAY }}><Trophy size={12} /> {s.mastered}/{ALL_CHARS.length}</span>
                  <button className="btn" onClick={() => { if (window.confirm(`'${s.name}' 학생의 기록을 정말 삭제할까요?\n\n별·진도·도감이 모두 사라지고 되돌릴 수 없어요.`)) onDeleteStudent(s.name); }} title="학생 삭제" style={{ cursor: "pointer", fontFamily: DISPLAY, fontSize: 12, borderRadius: 8, padding: "4px 8px", border: "1.5px solid #E2B4AC", background: "#FBEEEC", color: "#B0392B", flexShrink: 0 }}>삭제</button>
                </div>
                <div style={{ height: 6, background: "#EFE7D6", borderRadius: 99, margin: "8px 0 9px" }}>
                  <div style={{ height: "100%", width: `${(s.mastered / ALL_CHARS.length) * 100}%`, background: "#C9A227", borderRadius: 99 }} />
                </div>
                <div style={{ display: "flex", gap: 3, flexWrap: "wrap" }}>
                  {s.grades.map((g, i) => {
                    const full = g.done === g.total, part = g.done > 0 && !full;
                    return (
                      <div key={i} title={`${BELTS[i].grade} ${g.done}/${g.total}`}
                        style={{ width: 17, height: 17, borderRadius: 4, border: `1.5px solid ${BELTS[i].color}`, background: full ? BELTS[i].color : part ? `${BELTS[i].color}55` : "transparent" }} />
                    );
                  })}
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 11, color: "#9A8A72", marginTop: 6 }}>
                  <span>{s.curGrade < 0 ? "아직 시작 전" : `현재 ${BELTS[s.curGrade].grade} ${BELTS[s.curGrade].belt} (${s.grades[s.curGrade].done}/${s.grades[s.curGrade].total})`}</span>
                  <span style={{ color: "#A99B82" }}>🕒 {fmtSeen(s.seen)}</span>
                </div>
              </div>
            ))}
          </div>
        )
      ) : (
        <>
          <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
            <Pill>받음 {log.length}</Pill>
            <Pill><span style={{ color: pending ? "#C0392B" : "#2E9E4F" }}>지급 대기 {pending}</span></Pill>
          </div>
          {log.length === 0 ? (
            <div style={{ marginTop: 28, textAlign: "center", color: "#A99B82", fontSize: 14 }}>아직 복(福) 선물을 받은 학생이 없어요.</div>
          ) : (
            <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 9 }}>
              {log.map((e) => (
                <div key={e.id} style={{ display: "flex", alignItems: "center", gap: 11, background: "#fff", border: `2px solid ${e.given ? "#D8CBB0" : "#C9A227"}`, borderRadius: 16, padding: "11px 13px", opacity: e.given ? 0.6 : 1 }}>
                  <div style={{ width: 40, height: 40, borderRadius: 11, background: "#FBF3DC", border: "2px solid #C9A227", display: "grid", placeItems: "center", fontFamily: BRUSH, fontSize: 22, color: "#A8801F", flexShrink: 0 }}>福</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontFamily: DISPLAY, fontSize: 16 }}>🥋 {e.student}</div>
                    <div style={{ fontSize: 11.5, color: "#9A8A72", display: "flex", alignItems: "center", gap: 5 }}>{e.kind === "raid" ? <span style={{ color: "#B0392B", fontWeight: "bold" }}>🧧 봉인전 복복자 당첨!</span> : <><BeltIcon belt={BELTS[e.si]} size={12} /> {BELTS[e.si].grade}</>} · {fmt(e.ts)}</div>
                  </div>
                  <button className="btn" onClick={() => onToggle(e.id)} style={{ cursor: "pointer", fontFamily: DISPLAY, fontSize: 12.5, borderRadius: 999, padding: "7px 12px", border: "none", color: "#fff", background: e.given ? "#9CB89F" : "#2E9E4F" }}>
                    {e.given ? "지급함 ✓" : "지급 완료"}
                  </button>
                </div>
              ))}
            </div>
          )}
        </>
      )}
      <p style={{ textAlign: "center", color: "#B0A083", fontSize: 11.5, marginTop: 18 }}>현황·명단은 이 기기·이번 세션 기준이에요. 여러 기기 저장·알림은 배포(Firebase) 때 연결돼요.</p>
    </div>
  );
}

/* ---------- 한자마스터 명단 (명예의 전당) ---------- */
function HallOfFame({ profiles, onBack }) {
  const rows = Object.entries(profiles).map(([name, prog]) => {
    const mastered = Object.values(prog).filter((p) => p.mastered).length;
    const stars = Object.values(prog).reduce((s, p) => s + (p.stars || 0), 0);
    return { name, mastered, stars, isMaster: mastered >= ALL_CHARS.length };
  }).sort((a, b) => b.mastered - a.mastered || b.stars - a.stars);
  rows.forEach((r, i) => { r.rank = (i > 0 && rows[i - 1].mastered === r.mastered && rows[i - 1].stars === r.stars) ? rows[i - 1].rank : i + 1; });
  const rankCount = {}; rows.forEach((r) => { rankCount[r.rank] = (rankCount[r.rank] || 0) + 1; });
  rows.forEach((r) => { r.tied = rankCount[r.rank] > 1; });
  const medal = ["🥇", "🥈", "🥉"];
  return (
    <div style={{ paddingTop: 18 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <button className="btn" onClick={onBack} style={{ background: "none", border: "none", cursor: "pointer", color: "#5A4A33" }}><ChevronLeft size={26} /></button>
        <div>
          <h2 style={{ fontFamily: DISPLAY, fontSize: 23, margin: 0 }}>👑 수호대 명단</h2>
          <div style={{ fontSize: 12, color: "#9A8A72" }}>명예의 전당 · 한자를 많이 익힌 순서</div>
        </div>
      </div>
      {rows.length === 0 ? (
        <div style={{ marginTop: 28, textAlign: "center", color: "#A99B82", fontSize: 14 }}>아직 기록이 없어요. 게임을 시작해 보세요!</div>
      ) : (
        <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 9 }}>
          {rows.map((r, i) => (
            <div key={r.name} style={{ display: "flex", alignItems: "center", gap: 12, background: "#fff", border: `2px solid ${r.isMaster ? "#C9A227" : "#EADFC9"}`, borderRadius: 16, padding: "12px 14px" }}>
              <div style={{ width: 36, textAlign: "center" }}>
                {r.tied && <div style={{ fontSize: 9, color: "#C0392B", fontFamily: DISPLAY, lineHeight: 1.1 }}>공동</div>}
                <div style={{ fontFamily: DISPLAY, fontSize: 18, color: "#8A6A12" }}>{r.rank <= 3 ? medal[r.rank - 1] : r.rank}</div>
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: DISPLAY, fontSize: 17 }}>🥋 {r.name} {r.isMaster && <span style={{ fontSize: 15 }}>👑</span>}</div>
                <div style={{ fontSize: 12, color: "#9A8A72", display: "flex", gap: 10, marginTop: 1 }}>
                  <span><Trophy size={11} /> {r.mastered}/{ALL_CHARS.length}</span>
                  <span>⭐ {r.stars}</span>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
      <p style={{ textAlign: "center", color: "#B0A083", fontSize: 11.5, marginTop: 18 }}>명단은 이 기기·이번 세션 기준이에요.</p>
    </div>
  );
}

/* ---------- LOGIN (도장 입장) ---------- */
function Login({ passwords, onLogin, onBack }) {
  const [step, setStep] = useState("name"); // "name" | "pw"
  const [name, setName] = useState("");
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const [showAll, setShowAll] = useState(false);
  let remembered = null; try { remembered = localStorage.getItem("hanja_me"); } catch (e) {}
  const allNames = Object.keys(passwords);
  const myName = (remembered && allNames.includes(remembered)) ? remembered : null;
  const names = (myName && !showAll) ? [myName] : allNames;
  const returning = passwords[name] !== undefined;
  const inputStyle = { width: "100%", boxSizing: "border-box", fontFamily: FONT, fontSize: 16, padding: "12px 14px", borderRadius: 14, border: "2px solid #EADFC9", background: "#FCFAF4", outline: "none", marginTop: 6 };

  const toPw = (n) => { const nm = (typeof n === "string" ? n : name).trim(); if (!nm) return; setName(nm); setPw(""); setErr(""); setStep("pw"); };
  const submitPw = () => {
    if (pw.length < 4) { setErr("숫자 4자리를 입력해 주세요"); return; }
    if (passwords[name] !== undefined && passwords[name] !== pw) { setErr("비밀번호가 달라요. 다시 입력해 주세요"); setPw(""); return; }
    onLogin(name, pw);
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", justifyContent: "center", paddingBottom: 40 }}>
      <button className="btn" onClick={step === "pw" ? () => { setStep("name"); setErr(""); } : onBack}
        style={{ alignSelf: "flex-start", display: "inline-flex", alignItems: "center", gap: 3, cursor: "pointer", fontFamily: DISPLAY, fontSize: 14, background: "none", border: "none", color: "#7A6A52", marginTop: 14 }}>
        <ChevronLeft size={20} /> {step === "pw" ? "이름" : "메뉴"}
      </button>
      <div style={{ textAlign: "center" }}>
        <div style={{ width: 116, height: 116, margin: "0 auto", borderRadius: 30, background: "#fff", border: "3px solid #C9A227", display: "grid", placeItems: "center", boxShadow: "0 10px 0 rgba(0,0,0,.06)", animation: "pop .5s both" }}>
          <span style={{ fontFamily: BRUSH, fontSize: 66, color: "#A85808", animation: "brushIn .7s .15s both" }}>道</span>
        </div>
        <h1 style={{ fontFamily: DISPLAY, fontSize: 34, margin: "16px 0 2px" }}>한자 수호대</h1>
        <p style={{ color: "#9A8A72", fontSize: 13, margin: 0 }}>
          {step === "name" ? "이름을 적고 도장에 입장하세요" : returning ? "비밀번호를 입력하세요" : "새 친구예요! 비밀번호를 만들어요"}
        </p>
      </div>

      {step === "name" ? (
        <>
          <div style={{ marginTop: 24, background: "#fff", border: "2px solid #EADFC9", borderRadius: 22, padding: 18, boxShadow: "0 6px 0 rgba(0,0,0,.05)" }}>
            <div style={{ fontFamily: DISPLAY, fontSize: 14, color: "#5A4A33" }}>이름</div>
            <input value={name} onChange={(e) => setName(e.target.value)} onKeyDown={(e) => e.key === "Enter" && toPw()} placeholder="이름을 입력하세요" maxLength={12} style={inputStyle} />
            <button className="btn" onClick={() => toPw()} disabled={!name.trim()} style={{ width: "100%", marginTop: 18, cursor: name.trim() ? "pointer" : "not-allowed", border: "none", borderRadius: 16, padding: "14px", fontFamily: DISPLAY, fontSize: 17, color: "#fff", background: name.trim() ? "#C9A227" : "#CBBEA4", boxShadow: name.trim() ? "0 5px 0 rgba(0,0,0,.12)" : "none" }}>다음 →</button>
          </div>
          {names.length > 0 && (
            <div style={{ marginTop: 18 }}>
              <div style={{ fontSize: 12, color: "#9A8A72", marginBottom: 8 }}>{(myName && !showAll) ? "내 이름으로 들어가기" : "다시 들어가기"}</div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {names.map((n) => (
                  <button key={n} className="btn" onClick={() => toPw(n)} style={{ cursor: "pointer", fontFamily: DISPLAY, fontSize: 14, background: "#fff", border: "2px solid #EADFC9", borderRadius: 999, padding: "7px 14px", color: "#5A4A33" }}>🥋 {n}</button>
                ))}
              </div>
            </div>
          )}
          {(myName && !showAll) ? (
            <p style={{ textAlign: "center", marginTop: 16 }}>
              <button className="btn" onClick={() => setShowAll(true)} style={{ background: "none", border: "none", color: "#B0A083", fontFamily: DISPLAY, fontSize: 12, cursor: "pointer", textDecoration: "underline" }}>내 이름이 아니에요 / 다른 사람</button>
            </p>
          ) : (
            <p style={{ textAlign: "center", color: "#B0A083", fontSize: 11.5, marginTop: 20 }}>본인 이름을 한 번 고르면, 다음부터 이 기기엔 그 이름만 떠요</p>
          )}
          <p style={{ textAlign: "center", marginTop: 10 }}>
            <button className="btn" onClick={() => { if (window.confirm("반을 바꿀까요? (지금: " + (CLASSES[CLASS_KEY] || "") + " 수호대)")) { try { localStorage.removeItem("hanja_class"); } catch (e) {} location.reload(); } }} style={{ background: "none", border: "none", color: "#CBBEA4", fontFamily: DISPLAY, fontSize: 11.5, cursor: "pointer", textDecoration: "underline" }}>우리 반이 아니에요? 반 바꾸기 (지금: {CLASSES[CLASS_KEY]} 수호대)</button>
          </p>
        </>
      ) : (
        <div style={{ marginTop: 24, background: "#fff", border: "2px solid #EADFC9", borderRadius: 22, padding: 18, boxShadow: "0 6px 0 rgba(0,0,0,.05)" }}>
          <div style={{ fontFamily: DISPLAY, fontSize: 16, color: "#5A4A33", textAlign: "center", marginBottom: 4 }}>🥋 {name}</div>
          <div style={{ fontFamily: DISPLAY, fontSize: 14, color: "#5A4A33" }}>{returning ? "비밀번호" : "비밀번호 만들기"} <span style={{ color: "#B0A083", fontSize: 12 }}>(숫자 4자리)</span></div>
          <input value={pw} autoFocus inputMode="numeric" onChange={(e) => { setPw(e.target.value.replace(/[^0-9]/g, "").slice(0, 4)); setErr(""); }} onKeyDown={(e) => e.key === "Enter" && submitPw()} placeholder="● ● ● ●" style={{ ...inputStyle, letterSpacing: 8, textAlign: "center", fontSize: 22 }} />
          {err && <div style={{ color: "#C0392B", fontSize: 12.5, marginTop: 8, textAlign: "center" }}>{err}</div>}
          {!returning && <div style={{ color: "#9A8A72", fontSize: 11.5, marginTop: 8, textAlign: "center" }}>다음에 들어올 때 이 비밀번호가 필요해요. 잘 기억하세요!</div>}
          <button className="btn" onClick={submitPw} disabled={pw.length < 4} style={{ width: "100%", marginTop: 16, cursor: pw.length < 4 ? "not-allowed" : "pointer", border: "none", borderRadius: 16, padding: "14px", fontFamily: DISPLAY, fontSize: 17, color: "#fff", background: pw.length < 4 ? "#CBBEA4" : "#C9A227", boxShadow: pw.length < 4 ? "none" : "0 5px 0 rgba(0,0,0,.12)" }}>{returning ? "입장하기 →" : "비밀번호 등록하고 입장 →"}</button>
        </div>
      )}
    </div>
  );
}

/* ---------- STAGE SELECT ---------- */
function StageSelect({ student, onBack, progress, totalStars, masteredCount, unlockAll, onOpen }) {
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", paddingTop: 14 }}>
        <button className="btn" onClick={onBack} style={{ display: "inline-flex", alignItems: "center", gap: 3, cursor: "pointer", fontFamily: DISPLAY, fontSize: 14, background: "none", border: "none", color: "#7A6A52" }}><ChevronLeft size={20} /> 메뉴</button>
        <span style={{ fontFamily: DISPLAY, fontSize: 15, color: "#5A4A33" }}>🥋 {student}</span>
      </div>
      <header style={{ textAlign: "center", paddingTop: 8 }}>
        <h1 style={{ fontFamily: DISPLAY, fontSize: 30, margin: "4px 0 2px" }}>급수 도전</h1>
        <p style={{ fontSize: 13, color: "#9A8A72", margin: 0 }}>흰띠 ⬜ 에서 검은띠 ⬛, 그리고 수호대장 👑 까지</p>
        <div style={{ display: "flex", gap: 8, justifyContent: "center", marginTop: 14, flexWrap: "wrap" }}>
          <Pill><Star size={15} fill="#E8A020" stroke="#E8A020" /> {totalStars}</Pill>
          <Pill><Trophy size={15} /> {masteredCount}/{ALL_CHARS.length}</Pill>
        </div>
      </header>
      <div style={{ marginTop: 22, display: "flex", flexDirection: "column", gap: 11 }}>
        {CURRICULUM.map((st, i) => {
          const belt = BELTS[i];
          const done = st.chars.filter((c) => progress[c.char]?.mastered).length;
          const ready = st.chars.some((c) => c.words.length > 0);
          const cleared = isStageCleared(st, progress);
          const locked = !unlockAll && i > 0 && !isStageCleared(CURRICULUM[i - 1], progress);
          if (locked) {
            return (
              <div key={st.name} style={{ display: "flex", alignItems: "center", gap: 13, textAlign: "left",
                background: "#F3EEE2", border: "3px solid #E3D9C4", borderRadius: 20, padding: "13px 15px", opacity: 0.7 }}>
                <div style={{ width: 52, height: 52, borderRadius: 14, display: "grid", placeItems: "center", background: "#E8E0CD", border: "3px solid #D8CBB0", flexShrink: 0, filter: "grayscale(1)" }}><BeltIcon belt={belt} size={26} /></div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontFamily: DISPLAY, fontSize: 19, color: "#A4977C" }}>{belt.grade} · {st.name}</div>
                  <div style={{ fontSize: 12, color: "#B0A083" }}>이전 급을 완료하면 열려요</div>
                </div>
                <Lock size={18} color="#C0B496" />
              </div>
            );
          }
          return (
            <button key={st.name} className="btn" onClick={() => onOpen(i)}
              style={{ display: "flex", alignItems: "center", gap: 13, cursor: "pointer", textAlign: "left",
                background: "#fff", border: `3px solid ${belt.color}`, borderRadius: 20, padding: "13px 15px", boxShadow: "0 5px 0 rgba(0,0,0,0.05)" }}>
              <div style={{ width: 52, height: 52, borderRadius: 14, display: "grid", placeItems: "center", background: BELT_THEME[i].bg, border: `3px solid ${belt.color}`, flexShrink: 0 }}><BeltIcon belt={belt} size={26} /></div>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: DISPLAY, fontSize: 19, display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>{belt.grade} · {st.name}
                  {cleared && <span style={{ fontFamily: FONT, fontSize: 11, background: belt.color, color: "#fff", borderRadius: 99, padding: "1px 8px" }}>합격 ✓</span>}</div>
                <div style={{ fontSize: 12, color: "#9A8A72", marginBottom: 6 }}>{belt.belt ? belt.belt + " · " : ""}한자 {st.chars.length}자 · {done}자 완료 {ready ? "" : "· 음뜻"}</div>
                <div style={{ height: 6, background: "#EFE7D6", borderRadius: 99 }}>
                  <div style={{ height: "100%", width: `${(done / st.chars.length) * 100}%`, background: belt.color, borderRadius: 99 }} />
                </div>
              </div>
              <ArrowRight size={20} color={belt.color} />
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ---------- CHARACTER MAP (within a stage) ---------- */
function MapScreen({ stage, stageIndex, progress, onBack, onOpen, onOpenStage }) {
  const cleared = isStageCleared(stage, progress);
  const next = CURRICULUM[stageIndex + 1];
  const belt = BELTS[stageIndex];
  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 8, paddingTop: 18 }}>
        <button className="btn" onClick={onBack} style={{ background: "none", border: "none", cursor: "pointer", color: "#5A4A33" }}><ChevronLeft size={26} /></button>
        <div>
          <h2 style={{ fontFamily: DISPLAY, fontSize: 23, margin: 0, display: "flex", alignItems: "center", gap: 7 }}><BeltIcon belt={belt} size={22} /> {belt.grade} · {stage.name}</h2>
          <div style={{ fontSize: 12, color: "#9A8A72" }}>{belt.belt ? belt.belt + " · " : ""}한자를 눌러 음뜻과 낱말을 익혀요</div>
        </div>
      </div>
      <div style={{ marginTop: 18 }}>
        {stage.chars.map((c, i) => {
          const t = themeFor(stage, c); const done = progress[c.char]?.mastered; const ready = c.words.length > 0;
          const left = i % 2 === 0;
          return (
            <div key={c.char} style={{ display: "flex", justifyContent: left ? "flex-start" : "flex-end", marginBottom: 12 }}>
              <button className="btn" onClick={() => onOpen(i)} style={{ display: "flex", alignItems: "center", gap: 13, width: "84%", cursor: "pointer",
                background: "#fff", border: `2px solid ${done ? t.color : "#EADFC9"}`, borderRadius: 20, padding: "10px 14px", boxShadow: "0 5px 0 rgba(0,0,0,0.05)", textAlign: "left" }}>
                <div style={{ width: 52, height: 52, borderRadius: 14, flexShrink: 0, display: "grid", placeItems: "center", background: t.bg, border: `2px solid ${t.color}`, fontFamily: BRUSH, fontSize: 30, color: t.accent }}>{c.char}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontFamily: DISPLAY, fontSize: 18 }}>{c.meaning}</div>
                  <div style={{ fontSize: 11.5, color: "#9A8A72" }}>{ready ? `낱말 ${c.words.length}개` : "음뜻 학습"}{t.weekday ? ` · ${t.weekday}요일` : ""}</div>
                  <div style={{ marginTop: 3, display: "flex", alignItems: "center" }}>{[0,1,2].map((s)=>(<Star key={s} size={13} style={{marginRight:2}} fill={done && progress[c.char].stars>s?"#E8A020":"none"} stroke={done && progress[c.char].stars>s?"#E8A020":"#D8CBB0"} />))}{done && (progress[c.char].stars - 3 > 0) && <span style={{ marginLeft: 3, fontSize: 11.5, fontWeight: "bold", color: "#E8A020" }}>+{progress[c.char].stars - 3}🌟</span>}</div>
                </div>
                <div style={{ color: t.color }}>{done ? <RotateCw size={18} /> : <ArrowRight size={20} />}</div>
              </button>
            </div>
          );
        })}
      </div>
      {cleared && (
        <div style={{ position: "relative", marginTop: 14, background: "#fff", border: `2px solid ${BELT_THEME[stageIndex].color}`, borderRadius: 22, padding: "18px 16px", textAlign: "center", overflow: "hidden", animation: "pop .4s both" }}>
          <Confetti color={BELT_THEME[stageIndex].color} />
          <div style={{ fontSize: 30 }}>🎉</div>
          <div style={{ fontFamily: DISPLAY, fontSize: 19, color: BELT_THEME[stageIndex].accent, marginTop: 4 }}>{belt.grade} {belt.belt} 합격!</div>
          {next ? (
            <>
              <p style={{ fontSize: 13.5, color: "#7A6A52", margin: "6px 0 14px" }}>다음 급 <b style={{ color: BELTS[stageIndex + 1].color }}><BeltIcon belt={BELTS[stageIndex + 1]} size={14} /> {BELTS[stageIndex + 1].grade} {BELTS[stageIndex + 1].belt}</b> 로 승급해요</p>
              <BigButton t={{ color: BELT_THEME[stageIndex + 1].color }} onClick={() => onOpenStage(stageIndex + 1)}>다음 급 도전 →</BigButton>
            </>
          ) : (
            <p style={{ fontSize: 14, color: "#7A6A52", margin: "8px 0 4px" }}>모든 급을 통과했어요. 한자 수호대장 👑 달성!</p>
          )}
        </div>
      )}
    </div>
  );
}
function CharScreen({ stage, ch, onBack, onFinish }) {
  const t = themeFor(stage, ch);
  const hasWords = ch.words.length > 0;
  const [step, setStep] = useState(0);
  const [done, setDone] = useState([false, false, false, false]);
  const markDone = (i) => setDone((d) => d.map((x, k) => (k === i ? true : x)));

  return (
    <div style={{ minHeight: "100vh" }}>
      <div style={{ position: "sticky", top: 0, zIndex: 5, background: "#FBF7EFEE", backdropFilter: "blur(4px)", paddingTop: 14 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <button className="btn" onClick={onBack} style={{ background: "none", border: "none", cursor: "pointer", color: "#5A4A33" }}><ChevronLeft size={26} /></button>
          <div style={{ flex: 1, display: "flex", gap: 6 }}>
            {STEPS.map((s, i) => {
              const enabled = i === 0 || done[i - 1]; const active = i === step; const ok = done[i];
              return (
                <button key={s.key} className="btn" disabled={!enabled} onClick={() => enabled && setStep(i)}
                  style={{ flex: 1, cursor: enabled ? "pointer" : "not-allowed", border: "none", borderRadius: 10, padding: "7px 0",
                    background: active ? t.color : ok ? t.bg : "#EFE7D6", color: active ? "#fff" : ok ? t.accent : "#B6A98F", opacity: enabled ? 1 : 0.45, fontFamily: DISPLAY, fontSize: 11.5 }}>
                  {enabled ? s.label : <span style={{ display: "inline-flex", alignItems: "center", gap: 2 }}><Lock size={10} />{s.label}</span>}
                </button>
              );
            })}
          </div>
        </div>
      </div>

      <div style={{ paddingTop: 16 }}>
        {step === 0 && <Meet ch={ch} t={t} hasWords={hasWords} onNext={() => { markDone(0); if (hasWords) setStep(1); else onFinish(ch.char, 1); }} />}
        {step === 1 && hasWords && <Expand ch={ch} t={t} onNext={() => { markDone(1); setStep(2); }} />}
        {step === 2 && hasWords && <Infer ch={ch} t={t} onNext={() => { markDone(2); setStep(3); }} />}
        {step === 3 && hasWords && <Master ch={ch} t={t} onPass={(score, total) => { const stars = score === total ? 3 : score >= Math.ceil(total * 0.7) ? 2 : 1; onFinish(ch.char, stars); }} />}
      </div>
    </div>
  );
}

function Meet({ ch, t, hasWords, onNext }) {
  return (
    <div style={{ textAlign: "center" }}>
      <div style={{ fontFamily: DISPLAY, color: t.accent, fontSize: 14, marginBottom: 6 }}>① 만남 · 음과 뜻 익히기</div>
      <div style={{ position: "relative", display: "inline-block", margin: "14px 0" }}>
        <div style={{ width: 210, height: 210, borderRadius: 40, background: t.bg, border: `3px solid ${t.color}`, display: "grid", placeItems: "center", animation: "pop .5s both", boxShadow: "0 10px 0 rgba(0,0,0,.06)" }}>
          <span style={{ fontFamily: BRUSH, fontSize: 130, color: t.accent, animation: "brushIn .7s .15s both" }}>{ch.char}</span>
        </div>
        {t.icon && <div style={{ position: "absolute", top: -10, right: -6, fontSize: 34, animation: "floaty 3s infinite" }}>{t.icon}</div>}
      </div>
      <div style={{ fontFamily: DISPLAY, fontSize: 30, marginTop: 8 }}>{ch.meaning} <span style={{ color: t.color }}>·</span> [{ch.sound}]</div>
      <p style={{ color: "#7A6A52", fontSize: 15, marginTop: 6 }}>뜻은 <b style={{ color: t.accent }}>{ch.gloss}</b>{t.weekday ? `, ${t.weekday}요일의 한자예요.` : "."}</p>
      <button className="btn" onClick={() => speak(`${ch.meaning}`)} style={{ marginTop: 4, cursor: "pointer", background: "#fff", border: `2px solid ${t.color}`, color: t.accent, borderRadius: 999, padding: "9px 18px", fontFamily: DISPLAY, display: "inline-flex", gap: 6, alignItems: "center" }}><Volume2 size={18} /> 소리 듣기</button>
      <div style={{ marginTop: 26 }}>
        <BigButton t={t} onClick={onNext}>{hasWords ? "이 글자로 만든 낱말 만나기 →" : "음뜻 익히기 완료 ✓"}</BigButton>
        {!hasWords && <p style={{ color: "#A99B82", fontSize: 12.5, marginTop: 10 }}>이 한자의 낱말 학습은 곧 추가돼요.</p>}
      </div>
    </div>
  );
}

function Expand({ ch, t, onNext }) {
  const [flipped, setFlipped] = useState({});
  const seen = Object.keys(flipped).length;
  return (
    <div>
      <div style={{ fontFamily: DISPLAY, color: t.accent, fontSize: 14, textAlign: "center" }}>② 확장 · 낱말 카드 뒤집기</div>
      <p style={{ textAlign: "center", color: "#7A6A52", fontSize: 13, marginTop: 4 }}>카드를 눌러 뜻을 확인해요 <b style={{ color: t.accent }}>({seen}/{ch.words.length})</b></p>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginTop: 12 }}>
        {ch.words.map((w, i) => {
          const f = flipped[i];
          return (
            <button key={i} className="btn" onClick={() => setFlipped((p) => ({ ...p, [i]: !p[i] }))}
              style={{ cursor: "pointer", minHeight: 96, borderRadius: 16, padding: "10px", textAlign: "center", background: f ? t.color : "#fff", color: f ? "#fff" : "#2B2118", border: `2px solid ${t.color}`, transition: "all .25s", boxShadow: "0 4px 0 rgba(0,0,0,.05)" }}>
              {!f ? (
                <>
                  <div style={{ fontFamily: DISPLAY, fontSize: 21 }}>{w.word}</div>
                  <div style={{ fontFamily: BRUSH, fontSize: 17, color: t.accent, marginTop: 3 }}>{w.hanja}</div>
                </>
              ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: 7, alignItems: "center" }}>
                  <div style={{ display: "flex", gap: 4, flexWrap: "wrap", justifyContent: "center" }}>
                    {w.parts.map(([c, m], k) => (
                      <div key={k} style={{ background: "rgba(255,255,255,.22)", borderRadius: 9, padding: "3px 6px", textAlign: "center", minWidth: 32 }}>
                        <div style={{ fontFamily: BRUSH, fontSize: 18, lineHeight: 1.05 }}>{c}</div>
                        <div style={{ fontSize: 10.5, marginTop: 1 }}><b>{m}</b> {w.word[k]}</div>
                      </div>
                    ))}
                  </div>
